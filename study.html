<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Study · 学汉字</title>
    
    <script src="nav.js"></script>
    <script src="profiles.js"></script>
    <script src="shared/supabase-client.js"></script>
    <script src="shared/supabase-sync.js"></script>
    <script src="strings.js"></script>
    <script src="shared/auth-modal.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@400;600;700&family=Mali:wght@400;700&family=Nunito:wght@400;700;800;900&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    
    <!-- 🎨 Universal Design System -->
    <link rel="stylesheet" href="shared/design-system.css">
</head>
<body>
<div id="page-wrap">
    <div id="app-nav"></div>
    <div class="guest-banner" id="guest-banner" style="display:none;">
        <span>Progress is saved on this device for now. Sign up and we'll tell you when cloud saving is ready!</span>
        <button onclick="showAuthModal('upgrade')" data-i18n="save_my_progress">Save My Progress</button>
        <button class="dismiss" onclick="dismissGuestBanner()">✕</button>
    </div>
    <div id="main-content">
        <div id="view-map" class="view active">
            <div id="course-tabs"></div>
            <div id="map-header">
                <div id="map-title-block">
                    <div id="map-panda"></div>
                    <div id="map-title-text">
                        <h2 id="map-course-title">Loading...</h2>
                        <p id="map-course-sub"></p>
                    </div>
                </div>
                <div id="map-controls">
                    <button class="mode-btn active" data-mode="char" onclick="setMode('char')">🔤 Char</button>
                    <button class="mode-btn" data-mode="meaning" onclick="setMode('meaning')">💬 Meaning</button>
                    <button class="mode-btn" data-mode="random" onclick="setMode('random')">🔀 Mix</button>
                    <button id="quiet-toggle" class="quiet-btn" onclick="toggleQuiet()">🔊</button>
                </div>
            </div>
            <div id="journey-path"></div>
            <div id="dojo-section"><button id="dojo-btn" disabled>🥋 <span>Dojo</span><span class="dojo-label">— Games Coming Soon</span></button></div>
        </div>
        <div id="view-session" class="view">
            <div id="session-header">
                <button id="btn-back-map" onclick="confirmBackToMap()">←</button>
                <div id="session-mascot"></div>
                <span id="session-title">Numbers</span>
                <div id="session-progress-wrap">
                    <span id="session-progress-label">0 / 0</span>
                    <div id="session-progress-bar-bg"><div id="session-progress-bar"></div></div>
                </div>
            </div>
            <div id="phase-flash">
                <div id="flash-batch-label">Batch 1 of 1</div>
                <div id="flash-card-area"><div id="swipe-hint">← swipe → to browse</div></div>
                <div id="flash-dots"></div>
                <div id="flip-hint" style="display:none;text-align:center;font-size:.82rem;color:var(--botes-coral-deep);padding:0 0 8px;animation:hintFade2 .3s ease;font-weight:700;">👆 Tap each card to flip it first!</div>
                <div id="flash-footer">
                    <button id="btn-prev-card" onclick="prevCard()" disabled>‹ Prev</button>
                    <button id="btn-next-card" onclick="nextCard()">Next ›</button>
                    <button id="btn-to-quiz" onclick="startQuiz()" style="display:none;">Quiz! →</button>
                </div>
            </div>
            
            <div id="phase-quiz" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
                <div id="quiz-question-area">
                    <div id="quiz-char-display"></div>
                    <div id="quiz-prompt"></div>
                    <div class="quiz-try-dots">
                        <div class="quiz-try-dot" id="try-dot-1"></div>
                        <div class="quiz-try-dot" id="try-dot-2"></div>
                    </div>
                </div>
                <div id="quiz-options"></div>
            </div>
            <div id="phase-complete" style="display:none;flex:1;flex-direction:column;">
                <!-- Title and subtitle: full width, centered -->
                <div id="complete-title">Round Complete!</div>
                <div id="complete-sub"></div>
                
                <!-- Hero row with panda on LEFT and score on RIGHT -->
                <div id="complete-hero-row">
                    <div id="complete-panda"></div>
                    <div id="complete-emoji" style="display:none;">🎉</div>
                    <div id="complete-score-display">
                        <div class="cs-stars">⭐</div>
                        <div>
                            <div class="cs-points" id="cs-points">+0</div>
                            <div class="cs-label">stars earned</div>
                        </div>
                    </div>
                </div>
                
                <div id="complete-best-label"></div>
                <div class="complete-word-row" id="complete-word-list"></div>
                <button id="btn-continue-session" onclick="nextBatch()" style="display:none;">Next Batch →</button>
                <button id="btn-back-to-map" onclick="returnToMap()">← Back to Map</button>
            </div>
        </div>
    </div>
</div>
<div id="toast-container"></div>
<div id="reveal-overlay"></div>
<div class="badge-popup-overlay" id="badge-popup-overlay">
    <div class="badge-popup">
        <div class="badge-popup-emoji" id="badge-popup-emoji">🏅</div>
        <div class="badge-popup-title" id="badge-popup-title">New Badge!</div>
        <div class="badge-popup-sub" id="badge-popup-sub"></div>
        <button class="badge-popup-btn" onclick="closeBadgePopup()">Keep going! 🐼</button>
    </div>
</div>

<script>
var S={allCourses:[],courseWordMap:{},activeCourse:null,activeThemes:[],stageData:{},inSession:false,activeThemeId:null,activeThemeName:'',sessionMode:'char',quietMode:false,batches:[],batchIndex:0,currentBatch:[],cardIndex:0,seenCards:new Set(),allFlipped:false,quizWords:[],quizIndex:0,quizTries:0,quizResults:[],roundScore:0,sessionStarsEarned:0};
var voicesReady=false,pendingSpeak=null,_audioCtx=null;

/* === BOTES THEME COLOR PALETTE === */
var BOTES_PALETTE=[
  {color:'#E8C547',deep:'#C9A82F'}, // mustard
  {color:'#A4C2D9',deep:'#7FA3BD'}, // sky
  {color:'#E8836F',deep:'#C9624E'}, // coral
  {color:'#94A88E',deep:'#6F8A68'}, // sage
  {color:'#C97B5C',deep:'#A65A3D'}, // terracotta
  {color:'#D4A574',deep:'#B8854F'}, // ochre
  {color:'#D89B9B',deep:'#B47272'}, // rose
  {color:'#B8A05C',deep:'#8F7B40'}  // olive
];
/* Stable hash: same theme ID always gets same color */
function hashThemeId(s){var h=0;for(var i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return Math.abs(h);}
function getBotesColor(themeId){return BOTES_PALETTE[hashThemeId(themeId)%BOTES_PALETTE.length];}

/* === IMAGE LOADING WITH GRACEFUL FALLBACK === */
function setImageWithFallback(el,url){
  if(!el)return;
  var img=new Image();
  img.onload=function(){el.style.backgroundImage='url("'+url+'")';el.classList.remove('no-image');};
  img.onerror=function(){el.classList.add('no-image');};
  el._imgLoader=img;
  img.src=url;
}

/* === TONE COLORING === */
var TONE_MAP={1:'āēīōūǖĀĒĪŌŪǕ',2:'áéíóúǘÁÉÍÓÚǗ',3:'ǎěǐǒǔǚǍĚǏǑǓǙ',4:'àèìòùǜÀÈÌÒÙǛ'};
function detectTone(syllable){for(var tone=1;tone<=4;tone++){var marks=TONE_MAP[tone];for(var i=0;i<syllable.length;i++){if(marks.indexOf(syllable[i])!==-1)return tone;}}return 0;}
function colorPinyin(py){if(!py)return '';var parts=py.split(/(\s+|['\-])/);var html='';for(var i=0;i<parts.length;i++){var p=parts[i];if(/^\s+$/.test(p)||p==="'"||p==='-'){html+=p;}else if(p.length){var t=detectTone(p);html+='<span class="t'+t+'">'+escapeHtml(p)+'</span>';}}return html;}
function escapeHtml(s){return s.replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}

document.addEventListener('DOMContentLoaded',async function(){
    XHZ.requireActive();var profile=XHZ.getActiveProfile();if(!profile){location.href='index.html';return;}
    if(profile.is_guest&&localStorage.getItem('xhz_waitlisted')!=='true')document.getElementById('guest-banner').style.display='flex';
    var unlockAudio=function(){if(window.speechSynthesis){var u=new SpeechSynthesisUtterance(' ');u.volume=0.01;u.rate=10;window.speechSynthesis.speak(u);}document.body.removeEventListener('touchstart',unlockAudio);document.body.removeEventListener('click',unlockAudio);};
    document.body.addEventListener('touchstart',unlockAudio,{passive:true});document.body.addEventListener('click',unlockAudio,{passive:true});
    
    setImageWithFallback(document.getElementById('map-panda'),'assets/mascot/panda-wave.png');
    setImageWithFallback(document.getElementById('session-mascot'),'assets/mascot/panda-wave.png');
    
    await loadAllData();loadStageData();buildCourseTabs();selectCourse(S.allCourses[0].id);initNav('study');refreshStrings();initVoices();
    onLangChange(function(){refreshStrings();if(!S.inSession)return;var fv=document.getElementById('phase-flash').style.display!=='none';var qv=document.getElementById('phase-quiz').style.display!=='none';var cv=document.getElementById('phase-complete').style.display!=='none';if(fv)renderCard(S.cardIndex);if(qv)renderQuizQuestion();if(cv){var isPerfect=document.getElementById('complete-emoji').textContent==='🌟';var info=getStageInfo(S.activeCourse,S.activeThemeId);renderCompleteScreen(isPerfect,info?info.best_score:1);}});
});

function dismissGuestBanner(){document.getElementById('guest-banner').style.display='none';}
async function loadAllData(){var res=await fetch('courses.json');var data=await res.json();S.allCourses=data.courses;for(var i=0;i<S.allCourses.length;i++){var c=S.allCourses[i];var r=await fetch(c.data_file);var d=await r.json();S.courseWordMap[c.id]=d.words;}}
function stageKey(){return 'xhz_study_stages_'+XHZ.getActiveProfile().id;}
function loadStageData(){try{S.stageData=JSON.parse(localStorage.getItem(stageKey()))||{};}catch(e){S.stageData={};}}
function saveStageData(){localStorage.setItem(stageKey(),JSON.stringify(S.stageData));}
function getStageKey(cid,tid){return cid+'_'+tid;} function getStageInfo(cid,tid){return S.stageData[getStageKey(cid,tid)]||null;}
function saveStageResult(cid,tid,score){var k=getStageKey(cid,tid),ex=S.stageData[k],today=new Date().toISOString().slice(0,10);if(!ex||score>ex.best_score)S.stageData[k]={best_score:score,completed_date:today};saveStageData();}
function canAccessCourse(id){var c=S.allCourses.find(function(c){return c.id===id;});if(!c)return{allowed:false};if(c.is_free||!c.unlock)return{allowed:true};var pid=XHZ.getActiveProfile().id;var cond=c.unlock.condition,src=c.unlock.source;if(cond==='seen_100'){var ids=(S.courseWordMap[src]||[]).map(function(w){return w.word_id;});var pct=ids.length?(XHZ.getSeenCount(pid,ids)/ids.length)*100:0;return{allowed:pct>=100,reason:'See all words in '+src+' first',progress:pct};}if(cond==='mastered_80'){var pct=XHZ.getYearMasteredPercent(pid,src);return{allowed:pct>=80,reason:'Master 80% of '+src+' words first',progress:pct};}return{allowed:false,reason:'Not yet unlocked'};}

function buildCourseTabs(){var el=document.getElementById('course-tabs');el.innerHTML='';S.allCourses.forEach(function(course){var access=canAccessCourse(course.id);var btn=document.createElement('button');btn.className='course-tab'+(!access.allowed?' locked':'');btn.textContent=course.name;btn.dataset.id=course.id;btn.onclick=access.allowed?function(id){return function(){selectCourse(id);};}(course.id):function(c,a){return function(){alert('🔒 '+c.name+'\n\n'+a.reason+(a.progress!==undefined?'\n\nProgress: '+Math.round(a.progress)+'%':''));};}(course,access);el.appendChild(btn);});}

function selectCourse(id){
    S.activeCourse=id;
    document.querySelectorAll('.course-tab').forEach(function(b){b.classList.toggle('active',b.dataset.id===id);});
    var course=S.allCourses.find(function(c){return c.id===id;});
    S.activeThemes=course.themes;
    document.getElementById('map-course-title').textContent=course.name;
    var words=S.courseWordMap[id]||[];
    document.getElementById('map-course-sub').textContent=words.length+' characters · '+course.themes.length+' themes';
    if(course.themes&&course.themes[0]){var bc=getBotesColor(course.themes[0].id);applyThemeColor(bc.color,bc.deep);}
    renderJourneyPath(course,words);
}

function applyThemeColor(hex,hexDeep){
  document.documentElement.style.setProperty('--theme-color',hex);
  document.documentElement.style.setProperty('--theme-color-deep',hexDeep||hex);
  document.documentElement.style.setProperty('--theme-color-pale',hex+'22');
  if(typeof setNavTheme==='function')setNavTheme(hexDeep||hex);
}

function renderJourneyPath(course,allWords){
  var el=document.getElementById('journey-path');el.innerHTML='';
  var pid=XHZ.getActiveProfile().id;
  course.themes.forEach(function(theme,i){
    if(i>0){
      var conn=document.createElement('div');
      conn.className='stage-connector'+(getStageInfo(course.id,course.themes[i-1].id)?' done':'');
      el.appendChild(conn);
    }
    var themeWords=allWords.filter(function(w){return w.theme===theme.id;});
    var info=getStageInfo(course.id,theme.id);
    var isLocked=i>0&&!getStageInfo(course.id,course.themes[i-1].id);
    var wordIds=themeWords.map(function(w){return w.word_id;});
    var mastered=XHZ.getMasteredCount(pid,wordIds);
    var seen=XHZ.getSeenCount(pid,wordIds);
    var best=info?info.best_score:0;
    var stars='';for(var s=1;s<=5;s++)stars+='<span class="'+(s<=best?'lit':'')+'">⭐</span>';
    var badge=info?'<span class="stage-badge">✓ Done</span>':seen>0?'<span class="stage-badge in-progress">In Progress</span>':'';
    
    var bc=getBotesColor(theme.id);
    var card=document.createElement('button');
    card.className='stage-card'+(info?' completed':'')+(isLocked?' locked':'');
    card.style.setProperty('--theme-color',bc.color);
    card.style.setProperty('--theme-color-deep',bc.deep);
    if(!isLocked)card.onclick=function(th,tw){return function(){startSession(course.id,th,tw,allWords);};}(theme,themeWords);
    card.innerHTML='<div class="stage-icon">'+(isLocked?'🔒':theme.emoji)+'</div>'+
                   '<div class="stage-info">'+
                     '<h3>'+theme.name+'</h3>'+
                     '<div class="stage-meta">'+themeWords.length+' chars'+(info?' · '+info.completed_date:'')+' · '+mastered+'/'+themeWords.length+' mastered</div>'+
                     '<div class="stage-stars">'+stars+'</div>'+
                   '</div>'+badge;
    el.appendChild(card);
  });
}

function setMode(mode){S.sessionMode=mode;document.querySelectorAll('.mode-btn').forEach(function(b){b.classList.toggle('active',b.dataset.mode===mode);});}
function toggleQuiet(){S.quietMode=!S.quietMode;var btn=document.getElementById('quiet-toggle');btn.textContent=S.quietMode?'🔇':'🔊';btn.classList.toggle('active',S.quietMode);}

function startSession(courseId,theme,themeWords,allWords){
  S.activeCourse=courseId;S.activeThemeId=theme.id;S.activeThemeName=theme.name;
  S.inSession=true;S.sessionStarsEarned=0;
  var bc=getBotesColor(theme.id);
  applyThemeColor(bc.color,bc.deep);
  S.batches=makeBatches(shuffle(themeWords.slice()),4,allWords);
  S.batchIndex=0;
  showView('session');
  document.getElementById('session-title').textContent=theme.emoji+' '+theme.name;
  updateSessionProgress();
  startBatch(0);
}

function makeBatches(words,size,allWords){var batches=[];for(var i=0;i<words.length;i+=size){var batch=words.slice(i,i+size);if(batch.length<size){var others=allWords.filter(function(w){return !words.find(function(x){return x.word_id===w.word_id;});});var padding=shuffle(others.slice()).slice(0,size-batch.length).map(function(w){return Object.assign({},w,{_isPadding:true});});batch=batch.concat(padding);}batches.push(batch);}return batches.length?batches:[words];}

function updateSessionProgress(){
  var total=S.batches.reduce(function(s,b){return s+b.length;},0);
  var done=S.batchIndex*4;
  var onComplete=document.getElementById('phase-complete').style.display!=='none';
  if(onComplete&&S.currentBatch){done+=S.currentBatch.length;}
  if(done>total)done=total;
  document.getElementById('session-progress-label').textContent=done+' / '+total;
  document.getElementById('session-progress-bar').style.width=(total?Math.round(done/total*100):0)+'%';
}

function startBatch(bi){S.batchIndex=bi;S.currentBatch=S.batches[bi];S.cardIndex=0;S.seenCards=new Set();S.allFlipped=false;document.getElementById('flash-batch-label').textContent='Batch '+(bi+1)+' of '+S.batches.length;showPhase('flash');renderCard(0);updateDots();updateSessionProgress();var hint=document.getElementById('swipe-hint');if(hint){hint.style.animation='none';void hint.offsetHeight;hint.style.animation='hintFade 3s ease forwards';}}

function renderCard(index){
  S.cardIndex=index;
  var word=S.currentBatch[index];
  var area=document.getElementById('flash-card-area');
  var mode=S.sessionMode==='random'?(Math.random()>.5?'char':'meaning'):S.sessionMode;
  var lang=getNavLang();
  var isCharFront=(mode==='char');
  var meaningText=lang==='th'?word.th:word.en;
  var meaningClass='card-meaning'+(lang==='th'?' th':'');
  var illustrationUrl='assets/characters/'+word.word_id+'.png';
  
  var front,back;
  if(isCharFront){
    front='<div class="card-char">'+word.ch+'</div>'+
          '<div class="card-tap-hint">👆 Tap to reveal</div>';
    back='<div class="card-illustration" data-illust-url="'+illustrationUrl+'"></div>'+
         '<div class="card-char-small">'+word.ch+'</div>'+
         '<div class="card-pinyin">'+colorPinyin(word.py)+'</div>'+
         '<div class="'+meaningClass+'">'+meaningText+'</div>';
  }else{
    front='<div class="card-pinyin" style="font-size:1.7rem;">'+colorPinyin(word.py)+'</div>'+
          '<div class="'+meaningClass+'" style="font-size:1.15rem;">'+meaningText+'</div>'+
          '<div class="card-tap-hint">👆 Tap for character</div>';
    back='<div class="card-illustration" data-illust-url="'+illustrationUrl+'"></div>'+
         '<div class="card-char">'+word.ch+'</div>'+
         '<div class="card-pinyin">'+colorPinyin(word.py)+'</div>';
  }
  if(word.zh||word.sent_en){
    var sentLatin=lang==='th'?(word.sent_th||word.sent_en):word.sent_en;
    var sentClass=lang==='th'?'thai-sent':'latin-sent';
    var zhHighlighted=word.zh?word.zh.split(word.ch).join('<span class="keyword">'+word.ch+'</span>'):'';
    back+='<div class="card-sentence">'+
          (zhHighlighted?'<div class="zh-sent">'+zhHighlighted+'</div>':'')+
          (word.sent_en?'<div class="'+sentClass+'">'+sentLatin+'</div>':'')+
          '</div>';
  }
  if(word.story)back+='<div class="card-story">📖 '+word.story+'</div>';
  
  var old=area.querySelector('.flash-card');if(old)old.remove();
  var card=document.createElement('div');
  card.className='flash-card';
  card.innerHTML='<div class="flash-card-inner"><div class="flash-face flash-front">'+front+'</div><div class="flash-face flash-back">'+back+'</div></div>';
  if(S.seenCards.has(index))card.classList.add('flipped');
  card.addEventListener('click',function(){flipCard(card,index,word);});
  attachSwipe(card);
  area.appendChild(card);
  
  var illustEls=card.querySelectorAll('.card-illustration');
  illustEls.forEach(function(el){setImageWithFallback(el,el.dataset.illustUrl);});
  updateNavButtons();
}

function flipCard(card,index,word){if(card.classList.contains('flipped'))return;card.classList.add('flipped');S.seenCards.add(index);playFlipSound();if(!word._isPadding){XHZ.markSeen(word.word_id);var result=XHZ.addScore('study',1,[word.word_id]);S.sessionStarsEarned+=1;handleScoreResult(result,1);}if(!S.quietMode)speakChinese(word.ch);checkAllFlipped();updateDots();}
function checkAllFlipped(){if(S.seenCards.size>=S.currentBatch.length){S.allFlipped=true;updateNavButtons();}}
function attachSwipe(card){var sx=0,sy=0;card.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});card.addEventListener('touchend',function(e){var dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){if(dx<0)nextCard();else prevCard();}},{passive:true});}
function nextCard(){if(S.cardIndex<S.currentBatch.length-1)animateCardExit('left',function(){renderCard(S.cardIndex+1);updateDots();});} function prevCard(){if(S.cardIndex>0)animateCardExit('right',function(){renderCard(S.cardIndex-1);updateDots();});}
function animateCardExit(dir,cb){var card=document.querySelector('.flash-card');if(!card){cb();return;}playFlipSound();card.classList.add(dir==='left'?'swipe-left':'swipe-right');setTimeout(cb,260);}
function updateNavButtons(){var onLast=(S.cardIndex===S.currentBatch.length-1);var allSeen=S.allFlipped;var hint=document.getElementById('flip-hint');document.getElementById('btn-prev-card').disabled=(S.cardIndex===0);if(allSeen&&onLast){document.getElementById('btn-next-card').style.display='none';document.getElementById('btn-to-quiz').style.display='block';hint.style.display='none';}else if(allSeen){document.getElementById('btn-next-card').style.display='block';document.getElementById('btn-next-card').disabled=false;document.getElementById('btn-to-quiz').style.display='none';hint.style.display='none';}else if(onLast){document.getElementById('btn-next-card').style.display='block';document.getElementById('btn-next-card').disabled=true;document.getElementById('btn-to-quiz').style.display='none';hint.style.display='block';hint.style.animation='none';void hint.offsetHeight;hint.style.animation='hintFade2 .3s ease';highlightUnflippedDots();}else{document.getElementById('btn-next-card').style.display='block';document.getElementById('btn-next-card').disabled=onLast;document.getElementById('btn-to-quiz').style.display='none';hint.style.display='none';}}
function updateDots(){var el=document.getElementById('flash-dots');el.innerHTML='';S.currentBatch.forEach(function(_,i){var dot=document.createElement('div');dot.className='flash-dot'+(i===S.cardIndex?' current':'')+(S.seenCards.has(i)&&i!==S.cardIndex?' done':'');dot.onclick=function(i){return function(){animateCardExit(i>S.cardIndex?'left':'right',function(){renderCard(i);updateDots();});};}(i);el.appendChild(dot);});}
function highlightUnflippedDots(){document.querySelectorAll('.flash-dot').forEach(function(dot,i){dot.classList.remove('unflipped');if(!S.seenCards.has(i)&&i!==S.cardIndex)dot.classList.add('unflipped');});}
function startQuiz(){S.quizWords=S.currentBatch.slice();S.quizIndex=0;S.quizTries=0;S.quizResults=[];S.roundScore=0;showPhase('quiz');renderQuizQuestion();}

function renderQuizQuestion(){
  var word=S.quizWords[S.quizIndex];
  var lang=getNavLang();
  document.getElementById('try-dot-1').classList.remove('used');
  document.getElementById('try-dot-2').classList.remove('used');
  S.quizTries=0;
  document.getElementById('quiz-char-display').textContent=word.ch;
  document.getElementById('quiz-prompt').textContent=lang==='th'?'คำนี้แปลว่าอะไร?':'What does this character mean?';
  var allWords=S.courseWordMap[S.activeCourse]||[];
  var distractors=shuffle(allWords.filter(function(w){return w.word_id!==word.word_id;})).slice(0,3);
  var options=shuffle([word].concat(distractors));
  var grid=document.getElementById('quiz-options');
  grid.innerHTML='';
  options.forEach(function(opt){
    var btn=document.createElement('button');
    btn.className='quiz-option';
    btn.dataset.wordId=opt.word_id;
    btn.innerHTML='<span class="opt-meaning-main">'+(lang==='th'?opt.th:opt.en)+'</span>'+
                  '<span class="opt-pinyin">'+colorPinyin(opt.py)+'</span>';
    btn.addEventListener('click',function(){handleQuizAnswer(btn,opt.word_id===word.word_id,word);});
    grid.appendChild(btn);
  });
}

function handleQuizAnswer(btn,isCorrect,word){document.querySelectorAll('.quiz-option').forEach(function(b){b.disabled=true;});if(isCorrect){btn.classList.add('correct');playCorrectSound();if(!S.quietMode)setTimeout(function(){speakChinese(word.ch);},250);var stars=S.quizTries===0?3:1;var pop=document.createElement('div');pop.className='quiz-stars-pop';pop.textContent='+'+stars+'⭐';btn.appendChild(pop);if(!word._isPadding){var result=XHZ.addScore('study',stars,[word.word_id]);S.roundScore+=stars;S.sessionStarsEarned+=stars;handleScoreResult(result,stars);XHZ.markPracticed(word.word_id);XHZ.markQuizCleared(word.word_id);}S.quizResults.push({word:word,cleared:true,tries:S.quizTries+1});setTimeout(advanceQuiz,900);}else{btn.classList.add('wrong');S.quizTries++;playWrongSound();if(S.quizTries===1)document.getElementById('try-dot-1').classList.add('used');if(S.quizTries===2)document.getElementById('try-dot-2').classList.add('used');if(S.quizTries>=2){revealCorrectAnswer(word);S.quizResults.push({word:word,cleared:false,tries:2});setTimeout(advanceQuiz,1400);}else{setTimeout(function(){document.querySelectorAll('.quiz-option').forEach(function(b){if(!b.classList.contains('wrong'))b.disabled=false;});},500);}}}
function revealCorrectAnswer(word){document.getElementById('reveal-overlay').classList.add('visible');document.querySelectorAll('.quiz-option').forEach(function(btn){if(btn.dataset.wordId===word.word_id){btn.classList.add('revealed','revealed-big');btn.style.display='flex';}});}
function hideRevealOverlay(){document.getElementById('reveal-overlay').classList.remove('visible');document.querySelectorAll('.quiz-option.revealed-big').forEach(function(b){b.classList.remove('revealed-big');});}
function advanceQuiz(){hideRevealOverlay();S.quizIndex++;if(S.quizIndex<S.quizWords.length)renderQuizQuestion();else finishBatch();}
function finishBatch(){playBatchEndSound();var real=S.quizResults.filter(function(r){return !r.word._isPadding;});var clearedCount=real.filter(function(r){return r.cleared;}).length;var perfectRound=real.length>0&&clearedCount===real.length&&real.every(function(r){return r.tries===1;});if(perfectRound){var br=XHZ.addScore('study',5,[]);S.roundScore+=5;S.sessionStarsEarned+=5;handleScoreResult(br,5);}var starRating=scoreToStarRating(S.roundScore,real.length);saveStageResult(S.activeCourse,S.activeThemeId,starRating);showPhase('complete');renderCompleteScreen(perfectRound,starRating);updateSessionProgress();}
function scoreToStarRating(score,wordCount){var max=wordCount*3+5,pct=score/max;if(pct>=.95)return 5;if(pct>=.75)return 4;if(pct>=.55)return 3;if(pct>=.35)return 2;return 1;}

function renderCompleteScreen(isPerfect,starRating){
  var lang=getNavLang();
  var real=S.quizResults.filter(function(r){return !r.word._isPadding;});
  var clearedCount=real.filter(function(r){return r.cleared;}).length;
  
  var pandaUrl=isPerfect?'assets/mascot/panda-celebrate.png':'assets/mascot/panda-wave.png';
  var pandaEl=document.getElementById('complete-panda');
  var emojiEl=document.getElementById('complete-emoji');
  pandaEl.style.display='block';
  emojiEl.style.display='none';
  
  var img=new Image();
  img.onload=function(){
    pandaEl.style.backgroundImage='url("'+pandaUrl+'")';
    pandaEl.classList.remove('no-image');
    pandaEl.style.display='block';
    emojiEl.style.display='none';
  };
  img.onerror=function(){
    pandaEl.style.display='none';
    emojiEl.style.display='block';
    emojiEl.textContent=isPerfect?'🌟':'🎉';
  };
  pandaEl._imgLoader=img;
  img.src=pandaUrl;
  
  document.getElementById('complete-title').textContent=isPerfect?(lang==='th'?'เพอร์เฟกต์ !':'Perfect Round!'):(lang==='th'?'จบแล้ว!':'Round Complete!');
  document.getElementById('complete-sub').textContent=lang==='th'?'ถูก '+clearedCount+' / '+real.length+' คำ':clearedCount+' / '+real.length+' words correct';
  document.getElementById('cs-points').textContent='+'+S.roundScore;
  var existing=getStageInfo(S.activeCourse,S.activeThemeId);
  var bestEl=document.getElementById('complete-best-label');
  if(existing&&starRating>=existing.best_score){
    bestEl.textContent='🏆 '+(lang==='th'?'คะแนนสูงสุดใหม่!':'New best score!');
    bestEl.style.color='var(--botes-mustard-deep)';
  }else{
    bestEl.textContent='⭐'.repeat(starRating)+' ('+starRating+'/5)';
    bestEl.style.color='var(--ink-soft)';
  }
  var listEl=document.getElementById('complete-word-list');
  listEl.innerHTML='';
  real.forEach(function(r){
    var chip=document.createElement('div');
    chip.className='complete-word-chip';
    chip.innerHTML='<span class="cwc-ch">'+r.word.ch+'</span>'+
                   '<div><div style="font-weight:800;font-size:.85rem;font-family:var(--font-pinyin);">'+colorPinyin(r.word.py)+'</div>'+
                   '<div class="cwc-en">'+(lang==='th'?r.word.th:r.word.en)+'</div></div>'+
                   '<span class="cwc-icon">'+(r.cleared?'✅':'❌')+'</span>';
    listEl.appendChild(chip);
  });
  if(isPerfect){
    var bonus=document.createElement('div');
    bonus.style.cssText='grid-column:1/-1;background:var(--botes-mustard);border-radius:14px;padding:12px 16px;font-size:.9rem;color:var(--ink-dark);font-weight:800;text-align:center;';
    bonus.textContent=lang==='th'?'🌟 +5⭐ โบนัสตอบถูกหมด !':'🌟 +5⭐ Perfect round bonus!';
    listEl.appendChild(bonus);
  }
  document.getElementById('btn-continue-session').style.display=(S.batchIndex+1<S.batches.length)?'block':'none';
}

function nextBatch(){S.batchIndex++;startBatch(S.batchIndex);}
function showView(v){document.getElementById('view-map').classList.toggle('active',v==='map');document.getElementById('view-session').classList.toggle('active',v==='session');S.inSession=(v==='session');}
function showPhase(p){document.getElementById('phase-flash').style.display=p==='flash'?'flex':'none';document.getElementById('phase-quiz').style.display=p==='quiz'?'flex':'none';document.getElementById('phase-complete').style.display=p==='complete'?'flex':'none';}
function returnToMap(){S.inSession=false;showView('map');var course=S.allCourses.find(function(c){return c.id===S.activeCourse;});renderJourneyPath(course,S.courseWordMap[S.activeCourse]||[]);} function confirmBackToMap(){returnToMap();}
function handleScoreResult(result,stars){if(!result)return;if(stars>0)showToast('+'+stars+' ⭐','stars-toast',1500);if(result.newBadgeUnlocked&&result.badgeInfo)setTimeout(function(){showBadgePopup(result.badgeInfo);},600);if(result.newStudyUnlocked&&result.studyBadgeInfo)setTimeout(function(){showBadgePopup(result.studyBadgeInfo);},1200);}
function showBadgePopup(info){if(!info)return;document.getElementById('badge-popup-emoji').textContent=info.emoji||'🏅';document.getElementById('badge-popup-title').textContent='🎉 '+(info.label||'New Badge!');document.getElementById('badge-popup-sub').textContent='Keep it up! 🐼';document.getElementById('badge-popup-overlay').classList.add('visible');}
function closeBadgePopup(){document.getElementById('badge-popup-overlay').classList.remove('visible');}
function showToast(msg,type,duration){var c=document.getElementById('toast-container');var toast=document.createElement('div');toast.className='toast '+(type||'');toast.textContent=msg;c.appendChild(toast);setTimeout(function(){toast.style.animation='toastOut .3s ease forwards';setTimeout(function(){if(toast.parentNode)toast.parentNode.removeChild(toast);},300);},duration||2000);}
function initVoices(){if(!window.speechSynthesis)return;var load=function(){var v=window.speechSynthesis.getVoices();if(v.length){voicesReady=true;if(pendingSpeak){var fn=pendingSpeak;pendingSpeak=null;fn();}}};load();window.speechSynthesis.onvoiceschanged=load;setTimeout(load,100);setTimeout(load,500);}
function speakChinese(text){if(!window.speechSynthesis)return;var doSpeak=function(){window.speechSynthesis.cancel();var utt=new SpeechSynthesisUtterance(text);utt.lang='zh-CN';utt.rate=0.85;var voices=window.speechSynthesis.getVoices();var voice=voices.find(function(v){return v.lang==='zh-CN';})||voices.find(function(v){return v.lang.startsWith('zh');});if(voice)utt.voice=voice;window.speechSynthesis.speak(utt);};if(!voicesReady){pendingSpeak=doSpeak;window.speechSynthesis.getVoices();setTimeout(function(){if(pendingSpeak){pendingSpeak();pendingSpeak=null;}},150);}else{doSpeak();}}
function getAudioCtx(){if(!_audioCtx)_audioCtx=new (window.AudioContext||window.webkitAudioContext)();if(_audioCtx.state==='suspended')_audioCtx.resume();return _audioCtx;}
function playFlipSound(){try{var ctx=getAudioCtx();var buf=ctx.createBuffer(1,ctx.sampleRate*0.15,ctx.sampleRate);var d=buf.getChannelData(0);for(var i=0;i<d.length;i++){var t=i/d.length;d[i]=(Math.random()*2-1)*Math.sin(Math.PI*t);}var src=ctx.createBufferSource(),flt=ctx.createBiquadFilter(),g=ctx.createGain();src.buffer=buf;flt.type='bandpass';flt.frequency.setValueAtTime(400,ctx.currentTime);flt.frequency.linearRampToValueAtTime(2000,ctx.currentTime+0.08);flt.Q.value=1.5;src.connect(flt);flt.connect(g);g.connect(ctx.destination);g.gain.setValueAtTime(0.4,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.15);src.start();}catch(e){}}
function playCorrectSound(){try{var ctx=getAudioCtx();[1047,1319,1568,2093].forEach(function(freq,i){var osc=ctx.createOscillator(),g=ctx.createGain();osc.connect(g);g.connect(ctx.destination);osc.type='triangle';osc.frequency.value=freq;g.gain.setValueAtTime(0,ctx.currentTime+i*0.07);g.gain.linearRampToValueAtTime(0.15,ctx.currentTime+i*0.07+0.01);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.07+0.2);osc.start(ctx.currentTime+i*0.07);osc.stop(ctx.currentTime+i*0.07+0.2);});}catch(e){}}
function playWrongSound(){try{var ctx=getAudioCtx();var osc=ctx.createOscillator(),flt=ctx.createBiquadFilter(),g=ctx.createGain();osc.connect(flt);flt.connect(g);g.connect(ctx.destination);osc.type='sawtooth';osc.frequency.value=160;flt.type='lowpass';flt.frequency.setValueAtTime(800,ctx.currentTime);flt.frequency.linearRampToValueAtTime(200,ctx.currentTime+0.3);g.gain.setValueAtTime(0.2,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);osc.start();osc.stop(ctx.currentTime+0.3);}catch(e){}}
function playBatchEndSound(){try{var ctx=getAudioCtx();[440,554,659,880].forEach(function(freq,i){var osc=ctx.createOscillator(),g=ctx.createGain();osc.connect(g);g.connect(ctx.destination);osc.type='sine';osc.frequency.value=freq;g.gain.setValueAtTime(0,ctx.currentTime+i*0.09);g.gain.linearRampToValueAtTime(0.18,ctx.currentTime+i*0.09+0.01);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.09+0.25);osc.start(ctx.currentTime+i*0.09);osc.stop(ctx.currentTime+i*0.09+0.25);});}catch(e){}}
function shuffle(arr){for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=arr[i];arr[i]=arr[j];arr[j]=t;}return arr;}
</script>
