<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>学汉字 Learn Chinese</title>
<script src="nav.js"></script>
<script src="profiles.js"></script>
<script src="strings.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ======= PALETTE ======= */
:root {
    --bg:           #F2F1EC;
    --card-yellow:  #F9E847;
    --card-yellow-light: #FDF8D0;
    --teal:         #1B7B5E;
    --teal-light:   #D0F0E4;
    --teal-dark:    #145C47;
    --text-dark:    #222222;
    --text-mid:     #555555;
    --text-light:   #999999;
    --white:        #FFFFFF;
    --correct:      #4CAF50;
    --wrong:        #F44336;
    --pink-light:   #FDDEDE;
    --mint-light:   #D4F5E4;
    --radius-lg:    24px;
    --radius-md:    16px;
    --radius-sm:    12px;
    --radius-pill:  999px;
    --shadow-card:  0 4px 20px rgba(0,0,0,0.08);
    --shadow-btn:   0 4px 12px rgba(27,123,94,0.25);
    --safe-top:     env(safe-area-inset-top, 0px);
    --safe-bottom:  env(safe-area-inset-bottom, 0px);
    --theme-color:       #1B7B5E;
    --theme-color-light: #D0F0E4;
    --theme-color-pale:  #F2F1EC;
}

/* ======= RESET ======= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
    font-family: 'Nunito', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: var(--bg);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    color: var(--text-dark);
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
}

/* ======= LOADING ======= */
.loading-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 999; gap: 16px;
    font-size: 1em; color: var(--text-light);
    font-weight: 700;
}
.loading-spinner {
    width: 44px; height: 44px;
    border: 4px solid var(--teal-light);
    border-top-color: var(--teal);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ======= MOBILE TABS (WATCH / PRACTICE) ======= */
.mobile-tabs {
    display: none;
    background: var(--white);
    padding: 10px 16px;
    gap: 10px;
    z-index: 10;
}
.m-tab-btn {
    flex: 1;
    padding: 14px 10px;
    border-radius: var(--radius-pill);
    border: 2px solid var(--teal-light);
    font-weight: 800;
    font-size: 0.9em;
    background: var(--white);
    color: var(--teal);
    cursor: pointer;
    transition: all 0.2s;
    min-height: 48px;
    font-family: 'Nunito', sans-serif;
}
.m-tab-btn.active {
    background: var(--teal);
    color: var(--white);
    border-color: var(--teal);
    box-shadow: var(--shadow-btn);
}

/* ======= GUEST BANNER ======= */
.guest-banner {
    background: var(--card-yellow-light);
    border-bottom: 2px solid var(--card-yellow);
    padding: 10px 16px;
    display: flex; align-items: center;
    justify-content: space-between;
    gap: 10px; font-size: 0.78em;
    color: var(--text-mid); flex-shrink: 0;
    font-weight: 700;
}
.guest-banner button {
    background: var(--teal);
    color: var(--white);
    border: none;
    border-radius: var(--radius-pill);
    padding: 8px 16px;
    font-size: 0.85em;
    font-weight: 800;
    cursor: pointer;
    white-space: nowrap;
    min-height: 44px;
}
.guest-banner .dismiss {
    background: transparent;
    color: var(--text-light);
    font-size: 1.3em;
    padding: 0 8px;
    min-width: 44px;
    min-height: 44px;
    display: flex; align-items: center; justify-content: center;
}

/* ======= MAIN CONTENT ======= */
.main-content {
    display: flex;
    flex: 1;
    padding: 8px;
    gap: 8px;
    overflow: hidden;
    min-height: 0;
}

/* ======= PANELS (shared) ======= */
.panel {
    background: var(--white);
    border: none;
    border-radius: var(--radius-lg);
    padding: 16px;
    box-shadow: var(--shadow-card);
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    min-width: 0;
    position: relative;
    gap: 8px;
}

/* ==============================================
   FIX #1: LEFT PANEL — SIDE-BY-SIDE LAYOUT
   ============================================== */
.left-panel {
    background: var(--card-yellow);
    border-left: none;
    padding: 14px;
    gap: 8px;
}

/* The top row: canvas on left, info on right */
.watch-row {
    display: flex;
    gap: 14px;
    width: 100%;
    align-items: flex-start;
}

/* Canvas column */
.watch-canvas-col {
    flex-shrink: 0;
}

/* Info column (pinyin, meaning, buttons, mic) */
.watch-info-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 0;
    justify-content: center;
}

.char-box-wrapper {
    position: relative;
    flex-shrink: 0;
}

/* Default canvas sizes (desktop) */
.watch-canvas-col .char-box-wrapper {
    width: 160px;
    height: 160px;
}

.char-box {
    width: 100%; height: 100%;
    border-radius: var(--radius-md);
    background: var(--white);
    border: none;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
#anim-box { border: none; }
#quiz-box { border: none; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }

.crosshair {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    border-radius: var(--radius-md);
    overflow: hidden; z-index: 1;
}
.crosshair::before, .crosshair::after {
    content: ''; position: absolute;
    background: rgba(0,0,0,0.06);
}
.crosshair::before { top: 50%; left: 0; width: 100%; height: 1px; }
.crosshair::after { left: 50%; top: 0; width: 1px; height: 100%; }

#handwriting-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border-radius: var(--radius-md);
    pointer-events: none;
    z-index: 2;
}

/* ======= PINYIN ROW (now inside info col) ======= */
.pinyin-row {
    display: flex; align-items: center;
    gap: 8px;
    flex-shrink: 0;
    flex-wrap: wrap;
}
.pinyin-text {
    font-size: clamp(1.2em, 3vmin, 1.5em);
    color: var(--text-dark);
    font-weight: 900;
}
.tone-badge {
    display: inline-flex;
    align-items: center; justify-content: center;
    width: 26px; height: 26px;
    border-radius: 50%;
    font-size: 0.65em; font-weight: 800;
    flex-shrink: 0;
}
.tone-1 { background: #DBEAFE; color: #1D4ED8; }
.tone-2 { background: #D1FAE5; color: #065F46; }
.tone-3 { background: #FEF3C7; color: #92400E; }
.tone-4 { background: #FEE2E2; color: #991B1B; }
.tone-0 { background: #F3F4F6; color: #9CA3AF; }

/* ======= ICON BUTTONS (min 44px touch) ======= */
.icon-btn {
    background: rgba(255,255,255,0.6);
    border: none;
    border-radius: 50%;
    width: 44px; height: 44px;
    font-size: 1.1em;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
}
.icon-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.9); }
.icon-btn.speaking { background: var(--teal); animation: pulse 0.6s infinite alternate; }
.icon-btn.recording { background: var(--wrong); animation: pulse 0.6s infinite alternate; }
@keyframes pulse {
    from { transform: scale(1); box-shadow: 0 0 0 rgba(255,100,66,0.4); }
    to { transform: scale(1.1); box-shadow: 0 0 8px rgba(255,100,66,0.5); }
}

/* ======= MEANING TEXT (now compact) ======= */
.meaning-text {
    font-size: clamp(1em, 3.5vmin, 1.4em);
    color: var(--text-dark);
    flex-shrink: 0;
    font-weight: 900;
    line-height: 1.2;
}

/* ======= MIC RESULT (compact) ======= */
.mic-result {
    width: 100%;
    background: rgba(255,255,255,0.5);
    border-radius: var(--radius-sm);
    padding: 6px 10px;
    font-size: clamp(0.65em, 1.6vmin, 0.78em);
    color: var(--text-mid);
    text-align: center;
    border: 2px solid transparent;
    transition: all 0.3s;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    min-height: 36px;
    font-weight: 700;
}
.mic-result.correct { background: var(--mint-light); border-color: var(--correct); color: #065F46; }
.mic-result.wrong   { background: var(--pink-light); border-color: var(--wrong); color: #991B1B; }
.mic-result.listening { background: #FEF3C7; border-color: #F59E0B; color: #92400E; }

/* ======= REPLAY BUTTON ======= */
.replay-row { display: flex; align-items: center; justify-content: center; flex-shrink: 0; min-height: 18px; }
.replay-btn {
    background: var(--teal-light);
    border: none;
    border-radius: var(--radius-pill);
    padding: 4px 12px;
    font-size: 0.7em;
    font-weight: 800;
    color: var(--teal);
    cursor: pointer;
    display: none;
    align-items: center; gap: 4px;
    min-height: 32px;
    transition: background 0.2s;
}
.replay-btn.visible { display: flex; }
.replay-btn.playing { background: var(--teal); color: var(--white); animation: pulse 0.6s infinite alternate; }

/* ======= SENTENCE BLOCK (full width, below the row) ======= */
.sentence-block {
    background: rgba(255,255,255,0.5);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    width: 100%;
    flex-shrink: 0;
}
.sentence-zh-row { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
.sentence-zh { font-size: clamp(0.82em, 2vmin, 0.95em); color: var(--text-dark); font-weight: 800; }
.sentence-tr { font-size: clamp(0.68em, 1.6vmin, 0.78em); color: var(--text-light); font-weight: 700; }

/* ==============================================
   FIX #2 & #3: RIGHT PANEL — COMPACT MODE TOGGLE
   ============================================== */
.right-panel {
    background: var(--white) !important;
    gap: 8px;
}

.right-header {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    width: 100%;
    flex-shrink: 0;
}

/* Segmented emoji-only toggle */
.mode-toggle {
    display: flex;
    background: var(--bg);
    border-radius: var(--radius-pill);
    padding: 3px;
    gap: 0;
}
.mode-btn {
    padding: 0;
    width: 40px;
    height: 40px;
    border: none;
    background: transparent;
    color: var(--text-light);
    border-radius: 50%;
    font-size: 1.1em;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}
.mode-btn.active {
    background: var(--teal);
    color: var(--white);
    box-shadow: var(--shadow-btn);
}
/* Tooltip on hover for desktop */
.mode-btn::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: -28px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--text-dark);
    color: var(--white);
    font-size: 0.55em;
    padding: 3px 8px;
    border-radius: 6px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    z-index: 10;
}
.mode-btn:hover::after {
    opacity: 1;
}

/* Practice canvas wrapper */
.practice-canvas-col .char-box-wrapper {
    width: min(200px, 45vmin);
    height: min(200px, 45vmin);
}

/* ======= SCORE AREA ======= */
.score-area { text-align: center; width: 100%; flex-shrink: 0; }
.stars-display { font-size: clamp(1.3em, 4vmin, 1.8em); min-height: 1.4em; }
.score-label {
    font-size: 0.6em;
    color: var(--text-light);
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
}
.score-msg {
    font-size: clamp(0.72em, 2vmin, 0.85em);
    font-weight: 800;
    color: var(--correct);
    min-height: 1.2em;
    margin-top: 2px;
}
.stats-row { display: flex; justify-content: center; gap: 20px; margin-top: 6px; }
.stat-item { text-align: center; }
.stat-val { font-size: clamp(1em, 3vmin, 1.2em); font-weight: 900; color: var(--teal); }
.stat-lbl { font-size: 0.6em; color: var(--text-light); font-weight: 700; }

/* ==============================================
   FIX #4: PICKER ROW — FIT CONTENT
   ============================================== */
.word-list-section {
    background: var(--white);
    border-top: none;
    flex-shrink: 0;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.05);
    max-height: 210px;
    overflow-y: auto;
    transition: all 0.3s;
}

.picker-row {
    display: flex;
    gap: 8px;
    padding: 10px 12px 6px;
    align-items: stretch;
}

.picker-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    border: none;
    border-radius: var(--radius-pill);
    font-family: 'Nunito', sans-serif;
    font-size: 0.88em;
    font-weight: 800;
    color: var(--text-dark);
    cursor: pointer;
    transition: all 0.2s;
    min-height: 48px;
}
.picker-btn:active {
    transform: scale(0.96);
}
.picker-btn-emoji {
    font-size: 1.2em;
    flex-shrink: 0;
}
.picker-btn-label {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.picker-btn-arrow {
    font-size: 1em;
    color: var(--text-light);
    flex-shrink: 0;
}

/* Course picker: teal style, fit-content */
.picker-btn-course {
    background: var(--teal-light);
    color: var(--teal-dark);
    flex: 0 0 auto;    /* ← fit content */
}
.picker-btn-course .picker-btn-arrow { color: var(--teal); }

/* Category picker: yellow style, ALSO fit-content now */
.picker-btn-category {
    background: var(--card-yellow);
    color: var(--text-dark);
    flex: 0 0 auto;    /* ← FIX #4: was flex:1, now fit content */
    box-shadow: 0 2px 8px rgba(249,232,71,0.3);
}
.picker-btn-category .picker-btn-arrow { color: var(--text-mid); }

/* Hide old tabs */
.course-tabs, .set-tabs { display: none !important; }

/* ======= WORD BUTTONS (character grid) ======= */
.word-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 8px 12px 12px;
    justify-content: flex-start;
}
.word-btn {
    flex-shrink: 0;
    width: clamp(62px, 11vw, 72px);
    height: clamp(72px, 13vw, 82px);
    border: none;
    background: var(--bg);
    border-radius: var(--radius-md);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: clamp(1.4em, 4vw, 1.6em);
    color: var(--text-dark);
    position: relative;
    transition: all 0.2s;
    font-weight: 700;
    min-width: 56px;
    min-height: 56px;
}
.word-btn .wp {
    font-size: 0.28em;
    color: var(--text-light);
    margin-top: 2px;
    font-weight: 700;
}
.word-btn.active {
    background: var(--card-yellow);
    transform: scale(1.05);
    box-shadow: 0 4px 16px rgba(249,232,71,0.5);
}
.word-btn::before {
    content: ''; position: absolute;
    bottom: 4px; left: 50%;
    transform: translateX(-50%);
    width: 8px; height: 8px;
    border-radius: 50%;
    background: transparent;
}
.word-btn.status-seen::before     { background: #93C5FD; }
.word-btn.status-practiced::before { background: #FCD34D; }
.word-btn.status-mastered::before  { background: var(--correct); }
.word-btn.done::after {
    content: '✓'; position: absolute;
    top: -4px; right: -4px;
    background: var(--correct);
    color: white;
    border-radius: 50%;
    width: 18px; height: 18px;
    font-size: 0.36em;
    line-height: 18px;
    text-align: center;
    font-weight: 900;
}

/* ======= BOTTOM SHEET OVERLAY (shared) ======= */
.category-sheet-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 500;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
}
.category-sheet-overlay.open {
    opacity: 1;
    pointer-events: all;
}

.category-sheet {
    background: var(--white);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    width: 100%;
    max-width: 500px;
    max-height: 75vh;
    padding: 20px 16px 32px;
    padding-bottom: calc(32px + var(--safe-bottom));
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    overflow-y: auto;
}
.category-sheet-overlay.open .category-sheet {
    transform: translateY(0);
}

.category-sheet-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--bg);
}
.category-sheet-title {
    font-size: 1.1em;
    font-weight: 900;
    color: var(--text-dark);
}
.category-sheet-close {
    background: var(--bg);
    border: none;
    border-radius: 50%;
    width: 44px;
    height: 44px;
    font-size: 1.1em;
    color: var(--text-light);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    transition: all 0.2s;
}
.category-sheet-close:active {
    transform: scale(0.9);
    background: #e0e0e0;
}

.category-sheet-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}
.category-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 16px 8px;
    background: var(--bg);
    border: 3px solid transparent;
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: all 0.2s;
    min-height: 80px;
    font-family: 'Nunito', sans-serif;
}
.category-card:active { transform: scale(0.95); }
.category-card.active {
    background: var(--card-yellow-light);
    border-color: var(--card-yellow);
    box-shadow: 0 2px 12px rgba(249,232,71,0.4);
}
.category-card-emoji { font-size: 2em; }
.category-card-label {
    font-size: 0.75em;
    font-weight: 800;
    color: var(--text-dark);
    text-align: center;
    line-height: 1.2;
}

.course-sheet-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
}
.course-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 18px 12px;
    background: var(--bg);
    border: 3px solid transparent;
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: all 0.2s;
    min-height: 90px;
    font-family: 'Nunito', sans-serif;
    position: relative;
}
.course-card:active { transform: scale(0.95); }
.course-card.active {
    background: var(--teal-light);
    border-color: var(--teal);
    box-shadow: 0 2px 12px rgba(27,123,94,0.2);
}
.course-card.locked { opacity: 0.5; cursor: not-allowed; }
.course-card.locked:active { transform: none; }
.course-card-emoji { font-size: 2.2em; }
.course-card-label { font-size: 1em; font-weight: 900; color: var(--text-dark); text-align: center; }
.course-card-sub { font-size: 0.65em; font-weight: 700; color: var(--text-light); text-align: center; }
.course-card-lock { position: absolute; top: 8px; right: 8px; font-size: 0.9em; }
.course-card-progress { width: 80%; height: 4px; background: #e0e0e0; border-radius: 2px; overflow: hidden; margin-top: 4px; }
.course-card-progress-fill { height: 100%; background: var(--teal); border-radius: 2px; transition: width 0.3s; }

/* ======= BADGE / UNLOCK POPUPS ======= */
.badge-popup-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
}
.badge-popup-overlay.visible { opacity: 1; pointer-events: all; }
.badge-popup {
    background: var(--white);
    border-radius: var(--radius-lg);
    padding: 32px 28px;
    text-align: center;
    max-width: 300px; width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    transform: scale(0.8);
    transition: transform 0.3s;
}
.badge-popup-overlay.visible .badge-popup { transform: scale(1); }
.badge-popup-emoji { font-size: 3.5em; margin-bottom: 12px; }
.badge-popup-title { font-size: 1.2em; font-weight: 900; color: var(--text-dark); margin-bottom: 6px; }

@keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
.unlock-popup-title { font-size: 1.4em; font-weight: 900; color: var(--text-dark); margin-bottom: 8px; }

/* ======= ANIMATIONS ======= */

.shake { animation: shake 0.3s ease; }

.no-mic-msg {

<script>
var COURSES=[], COURSE_DATA={}, currentCourse=null, THEMES=[], WORDS=[], currentTheme=0, idx=0, mode='beginner';
var animW=null, quizW=null, mistakes=0, corrects=0, doneSet={};
var recognition=null, recognitionTimeout=null, mediaRecorder=null, audioChunks=[], audioBlob=null, audioURL=null, audioPlayer=null, isListening=false, recognitionDone=false, micResultTimer=null;
var canvas=null, ctx=null, isDrawing=false, currentPoints=[], canvasStrokes=[];
var previouslyLockedCourses={};

// ============================================
// BULLETPROOF SPEECH ENGINE
// ============================================
var speechReady = false;
var speechUnlocked = false;
var voiceCache = null;
var speechQueue = [];

function initSpeechEngine() {
    if (!window.speechSynthesis) return;
    var attempts = 0;
    var maxAttempts = 50;
    function tryLoadVoices() {
        var voices = window.speechSynthesis.getVoices();
        if (voices.length > 0) {
            voiceCache = findChineseVoice(voices);
            speechReady = true;
            flushSpeechQueue();
            return;
        }
        attempts++;
        if (attempts < maxAttempts) setTimeout(tryLoadVoices, 100);
    }
    window.speechSynthesis.onvoiceschanged = function() {
        var voices = window.speechSynthesis.getVoices();
        if (voices.length > 0) {
            voiceCache = findChineseVoice(voices);
            speechReady = true;
            flushSpeechQueue();
        }
    };
    tryLoadVoices();
    var unlockSpeech = function() {
        if (speechUnlocked) return;
        speechUnlocked = true;
        try {
            window.speechSynthesis.cancel();
            var silence = new SpeechSynthesisUtterance('');
            silence.volume = 0.01; silence.rate = 10; silence.lang = 'zh-CN';
            if (voiceCache) silence.voice = voiceCache;
            window.speechSynthesis.speak(silence);
        } catch(e) {}
        setTimeout(flushSpeechQueue, 200);
        document.removeEventListener('touchstart', unlockSpeech);
        document.removeEventListener('touchend', unlockSpeech);
        document.removeEventListener('click', unlockSpeech);
    };
    document.addEventListener('touchstart', unlockSpeech, { passive: true });
    document.addEventListener('touchend', unlockSpeech, { passive: true });
    document.addEventListener('click', unlockSpeech, { passive: true });
}

function findChineseVoice(voices) {
    return voices.find(function(v) { return v.lang === 'zh-CN'; })
        || voices.find(function(v) { return v.lang === 'zh-TW'; })
        || voices.find(function(v) { return v.lang.startsWith('zh'); })
        || null;
}

function flushSpeechQueue() {
    if (!speechReady) return;
    while (speechQueue.length > 0) {
        var job = speechQueue.shift();
        doSpeak(job.text, job.rate, job.btnSelector);
    }
}

function doSpeak(text, rate, btnSelector) {
    if (!window.speechSynthesis) return;
    if (!speechReady) {
        speechQueue.push({ text: text, rate: rate, btnSelector: btnSelector });
        return;
    }
    window.speechSynthesis.cancel();
    setTimeout(function() {
        try {
            var u = new SpeechSynthesisUtterance(text);
            u.lang = 'zh-CN'; u.rate = rate || 0.7; u.volume = 1.0;
            if (voiceCache) u.voice = voiceCache;
            var btn = btnSelector ? (document.querySelector(btnSelector) || document.getElementById(btnSelector)) : null;
            if (btn) btn.classList.add('speaking');
            var watchdog = setTimeout(function() { if (btn) btn.classList.remove('speaking'); }, Math.max(3000, text.length * 800));
            u.onend = function() { clearTimeout(watchdog); if (btn) btn.classList.remove('speaking'); };
            u.onerror = function() { clearTimeout(watchdog); if (btn) btn.classList.remove('speaking'); };
            window.speechSynthesis.speak(u);
            var resumeInterval = setInterval(function() {
                if (!window.speechSynthesis.speaking) { clearInterval(resumeInterval); return; }
                window.speechSynthesis.resume();
            }, 300);
            setTimeout(function() { clearInterval(resumeInterval); }, 10000);
        } catch(e) {
            console.warn('Speech error:', e);
            if (btn) btn.classList.remove('speaking');
        }
    }, 50);
}

function speakWord() {
    var word = getThemeWords()[idx];
    if (!word) return;
    doSpeak(word.ch, 0.6, '#pinyin-speaker-btn');
}

function speakSentence() {
    var word = getThemeWords()[idx];
    if (!word) return;
    doSpeak(word.zh, 0.8, '.sentence-zh-row .icon-btn');
}

// ============================================
// MAIN APP
// ============================================

window.onload = function() {
    XHZ.requireActive();
    checkMicSupport();
    initCanvas();
    showGuestWarningIfNeeded();
    loadCourses();
    initSpeechEngine();
    onLangChange(function() { updateLeftPanel(idx); });
};

function switchTab(target) {
    var pWatch=document.getElementById('panel-watch'), pWrite=document.getElementById('panel-write');
    var bWatch=document.getElementById('m-tab-watch'), bWrite=document.getElementById('m-tab-write');
    if (target === 'watch') {
        pWatch.classList.remove('mobile-hidden'); pWrite.classList.add('mobile-hidden');
        bWatch.classList.add('active'); bWrite.classList.remove('active');
    } else {
        pWrite.classList.remove('mobile-hidden'); pWatch.classList.add('mobile-hidden');
        bWrite.classList.add('active'); bWatch.classList.remove('active');
    }
    setTimeout(function() { target === 'watch' ? initAnimWriter(idx) : (clearCanvas(), initQuizWriter(idx)); }, 100);
}

function getLang() { return getNavLang(); }
function getThemeWords() { return !currentCourse || !THEMES.length ? [] : WORDS.filter(function(w) { return w.theme === THEMES[currentTheme].id; }); }
function showGuestWarningIfNeeded() {
    var waitlisted = localStorage.getItem('xhz_waitlisted') === 'true';
    if (!waitlisted && XHZ.shouldWarnGuest()) {
        document.getElementById('guest-banner').style.display = 'flex';
        XHZ.markGuestWarned();
    }
}
function dismissGuestBanner() { document.getElementById('guest-banner').style.display = 'none'; }

function loadCourses() {
    setLoadingMsg('Loading courses...');
    Promise.all([
        fetch('courses.json').then(function(r) { if (!r.ok) throw new Error(); return r.json(); }),
        fetch('rewards.json').then(function(r) { return r.ok ? r.json() : null; }).catch(function(){ return null; })
    ]).then(function(results) {
        var courseData = results[0];
        var rewardsData = results[1];
        COURSES = courseData.courses;
        if (rewardsData && rewardsData.effort_items) XHZ.setEffortItems(rewardsData.effort_items);
        if (!COURSES || COURSES.length === 0) { showLoadError('No courses found'); return; }
        setLoadingMsg('Loading word data...');
        preloadAllCourseData(function() {
            document.getElementById('loading-screen').style.display = 'none';
            initLockedCoursesState();
            var first = getFirstAccessibleCourse();
            if (!first) first = COURSES[0];
            buildCourseTabs();
            selectCourse(first.id);
        });
    }).catch(function(e) {
        console.error('Failed to load courses:', e);
        showLoadError('Could not load courses.json');
    });
}

function preloadAllCourseData(callback) {
    var toLoad = COURSES.filter(function(c) { return !COURSE_DATA[c.id] && c.data_file; });
    if (toLoad.length === 0) { if (callback) callback(); return; }
    var loaded = 0, total = toLoad.length;
    function checkDone() {
        loaded++;
        setLoadingMsg('Loading word data... (' + loaded + '/' + total + ')');
        if (loaded >= total && callback) callback();
    }
    toLoad.forEach(function(course) {
        fetch(course.data_file)
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(data) { if (data) COURSE_DATA[course.id] = data; checkDone(); })
            .catch(function() { checkDone(); });
    });
    setTimeout(function() { if (loaded < total && callback) callback(); }, 10000);
}

function loadCourseData(courseId, callback) {
    if (COURSE_DATA[courseId]) { callback(COURSE_DATA[courseId]); return; }
    var course = getCourseById(courseId);
    if (!course) return;
    setLoadingMsg('Loading ' + courseId + ' words...');
    document.getElementById('loading-screen').style.display = 'flex';
    fetch(course.data_file).then(function(r) { if (!r.ok) throw new Error(); return r.json(); })
    .then(function(data) {
        COURSE_DATA[courseId] = data;
        document.getElementById('loading-screen').style.display = 'none';
        callback(data);
    }).catch(function(e) {
        console.error('Failed to load course data:', e);
        showLoadError('Could not load ' + course.data_file);
    });
}

function setLoadingMsg(msg) { var el = document.getElementById('loading-msg'); if (el) el.textContent = msg; }
function showLoadError(html) { document.getElementById('loading-screen').innerHTML = '<div style="color:#F44336;text-align:center;padding:20px;font-weight:800;">❌ ' + html + '</div>'; }

function canAccessCourse(courseId) {
    var course = getCourseById(courseId);
    if (!course) return { allowed: false, reason: 'Course not found' };
    if (course.is_free || !course.unlock) return { allowed: true };
    var source = course.unlock.source, condition = course.unlock.condition, pct;
    if (condition === 'seen_100') {
        pct = XHZ.getCourseSeenPercent(source);
        return { allowed: pct >= 100, reason: 'See all words in ' + source + ' first', progress: pct };
    }
    if (condition === 'mastered_80') {
        pct = XHZ.getYearMasteredPercent(source);
        return { allowed: pct >= 80, reason: 'Master 80% of ' + source + ' words first', progress: pct };
    }
    return { allowed: false, reason: 'Not yet unlocked' };
}

function getFirstAccessibleCourse() { for (var i = 0; i < COURSES.length; i++) if (canAccessCourse(COURSES[i].id).allowed) return COURSES[i]; return null; }
function getCourseById(id) { return COURSES.find(function(c) { return c.id === id; }) || null; }

function initLockedCoursesState() {
    COURSES.forEach(function(course) {
        previouslyLockedCourses[course.id] = !canAccessCourse(course.id).allowed;
    });
}

function checkForNewUnlocks() {
    for (var i = 0; i < COURSES.length; i++) {
        var course = COURSES[i];
        var wasLocked = previouslyLockedCourses[course.id];
        var access = canAccessCourse(course.id);
        if (wasLocked === true && access.allowed === true) {
            previouslyLockedCourses[course.id] = false;
            showUnlockPopup(course);
            buildCourseTabs();
            return;
        }
    }
}

function showUnlockPopup(course) {
    var overlay = document.getElementById('unlock-popup-overlay');
    if (!overlay) { alert('🎉 Course Unlocked: ' + course.name); return; }
    var sourceProgress = course.unlock ? XHZ.getCourseProgress(course.unlock.source) : null;
    document.getElementById('unlock-popup-emoji').textContent = '🎊';
    document.getElementById('unlock-popup-title').textContent = '🔓 New Course Unlocked!';
    document.getElementById('unlock-popup-sub').innerHTML = 'Congratulations! You\'ve unlocked<br><strong>' + course.name + '</strong>';
    if (sourceProgress && sourceProgress.total > 0) {
        document.getElementById('unlock-popup-progress').innerHTML = '✅ ' + sourceProgress.seen + '/' + sourceProgress.total + ' words seen';
    } else {
        document.getElementById('unlock-popup-progress').innerHTML = '';
    }
    document.getElementById('unlock-popup-btn').onclick = function() { closeUnlockPopup(); selectCourse(course.id); };
    overlay.classList.add('visible');
}
function closeUnlockPopup() { var o = document.getElementById('unlock-popup-overlay'); if (o) o.classList.remove('visible'); }

// ============================================
// COURSE PICKER
// ============================================
var COURSE_EMOJIS = {
    '1A':'📗','1B':'📘','2A':'📕','2B':'📙',
    '3A':'📓','3B':'📔','4A':'📗','4B':'📘',
    '5A':'📕','5B':'📙','6A':'📓','6B':'📔'
};
function getCourseEmoji(id) { return COURSE_EMOJIS[id] || '📖'; }

function buildCourseTabs() {
    var grid = document.getElementById('course-sheet-grid');
    if (!grid) return;
    grid.innerHTML = '';
    COURSES.forEach(function(course) {
        var access = canAccessCourse(course.id);
        var isActive = currentCourse && currentCourse.id === course.id;
        var card = document.createElement('div');
        card.id = 'course-card-' + course.id;
        if (access.allowed) {
            card.className = 'course-card' + (isActive ? ' active' : '');
            card.onclick = (function(id) { return function() { selectCourse(id); closeCoursePicker(); }; })(course.id);
        } else {
            card.className = 'course-card locked';
            card.onclick = (function(c, a) { return function() { showLockedHint(c, a); }; })(course, access);
        }
        var progressHTML = '';
        if (!access.allowed && access.progress !== undefined) {
            progressHTML = '<div class="course-card-progress"><div class="course-card-progress-fill" style="width:' + Math.round(access.progress) + '%"></div></div>';
        }
        card.innerHTML =
            (access.allowed ? '' : '<span class="course-card-lock">🔒</span>') +
            '<span class="course-card-emoji">' + getCourseEmoji(course.id) + '</span>' +
            '<span class="course-card-label">' + course.id + '</span>' +
            '<span class="course-card-sub">' + (course.name || course.id) + '</span>' +
            progressHTML;
        grid.appendChild(card);
    });
    if (currentCourse) updateCoursePickerButton(currentCourse.id);
}

function updateCoursePickerButton(courseId) {
    var e = document.getElementById('course-picker-emoji');
    var l = document.getElementById('course-picker-label');
    if (e) e.textContent = getCourseEmoji(courseId);
    if (l) l.textContent = courseId;
}

function updateCourseTabsProgress() {
    COURSES.forEach(function(course) {
        var card = document.getElementById('course-card-' + course.id);
        if (!card) return;
        var access = canAccessCourse(course.id);
        var isActive = currentCourse && currentCourse.id === course.id;
        if (access.allowed) {
            card.className = 'course-card' + (isActive ? ' active' : '');
        } else {
            card.className = 'course-card locked' + (isActive ? ' active' : '');
        }
    });
}

function selectCourse(courseId) {
    COURSES.forEach(function(c) {
        var card = document.getElementById('course-card-' + c.id);
        if (card && !card.classList.contains('locked')) {
            card.className = 'course-card' + (c.id === courseId ? ' active' : '');
        }
    });
    currentCourse = getCourseById(courseId);
    updateCoursePickerButton(courseId);
    loadCourseData(courseId, function(data) {
        WORDS = data.words;
        THEMES = currentCourse.themes;
        buildSetTabs();
        selectTheme(0);
    });
}

function showLockedHint(course, access) {
    var msg = '🔒 ' + course.name + '\n\n' + access.reason;
    if (course.unlock && course.unlock.source) {
        var progress = XHZ.getCourseProgress(course.unlock.source);
        if (progress && progress.total > 0) {
            var remaining = progress.total - progress.seen;
            msg += '\n\n📊 Progress: ' + progress.seen + ' / ' + progress.total + ' words seen';
            msg += '\n(' + Math.round((progress.seen / progress.total) * 100) + '%)';
            if (remaining > 0) msg += '\n\n👉 ' + remaining + ' more word' + (remaining > 1 ? 's' : '') + ' to go!';
        }
    }
    alert(msg);
}

function openCoursePicker() {
    var o = document.getElementById('course-sheet-overlay');
    if (o) o.classList.add('open');
}
function closeCoursePicker() {
    var o = document.getElementById('course-sheet-overlay');
    if (o) o.classList.remove('open');
}

function buildSetTabs() {

    if (grid) grid.innerHTML = '';
    THEMES.forEach(function(theme, i) {
        if (grid) {
            var card = document.createElement('div');

            card.id = 'cat-card-' + i;
            card.innerHTML =
                '<span class="category-card-emoji">' + theme.emoji + '</span>' +
                '<span class="category-card-label">' + theme.name + '</span>';
            card.onclick = (function(idx) {
                return function() { selectTheme(idx); closeCategoryPicker(); };
            })(i);
            grid.appendChild(card);
        }
    });
    if (THEMES.length > 0) updatePickerButton(0);
}

function selectTheme(i) {
    currentTheme = i; idx = 0;
    THEMES.forEach(function(_, j) {
        var card = document.getElementById('cat-card-' + j);
        if (card) card.className = 'category-card' + (j === i ? ' active' : '');
    });
    updatePickerButton(i);
    applyThemeColor(THEMES[i].color);
    buildWordList();
    if (getThemeWords().length > 0) loadChar(0);
}

function updatePickerButton(i) {
    var theme = THEMES[i];
    if (!theme) return;
    var e = document.getElementById('picker-emoji');
    var l = document.getElementById('picker-label');
    if (e) e.textContent = theme.emoji;
    if (l) l.textContent = theme.name;

function openCategoryPicker() {

    if (o) o.classList.add('open');
}
function closeCategoryPicker() {
    var o = document.getElementById('category-sheet-overlay');
    if (o) o.classList.remove('open');
}

function applyThemeColor(hex) {
    var r = document.documentElement;
    r.style.setProperty('--theme-color', hex);
    r.style.setProperty('--theme-color-light', hex + '55');
    r.style.setProperty('--theme-color-pale', hex + '18');
    setNavTheme(hex);
}

function buildWordList() {
    var wl = document.getElementById('word-list'), words = getThemeWords(); wl.innerHTML = '';
    words.forEach(function(word, i) {
        var btn = document.createElement('div'), doneKey = currentCourse.id + '_' + word.word_id;
        var mastery = XHZ.getWordMastery(word.word_id), statusClass = mastery ? ' status-' + mastery.status : '';
        btn.className = 'word-btn' + (i === idx ? ' active' : '') + (doneSet[doneKey] ? ' done' : '') + statusClass;
        btn.id = 'wb-' + i; btn.innerHTML = word.ch + '<span class="wp">' + word.py + '</span>';
        btn.onclick = (function(i) { return function() { loadChar(i); }; })(i);
        wl.appendChild(btn);
    });
}

function loadChar(i) {
    idx = i; stopListening(); clearRecording(); resetMicResult(); clearCanvas();
    if (quizW) { try { quizW.cancelQuiz(); } catch(e) {} quizW = null; }
    if (animW) { try { animW.cancelAnimation(); } catch(e) {} animW = null; }
    var animBox = document.getElementById('anim-box'), quizBox = document.getElementById('quiz-box');
    if (animBox) animBox.innerHTML = ''; if (quizBox) quizBox.innerHTML = '';
    mistakes = 0; corrects = 0; resetScore();
    var words = getThemeWords();
    words.forEach(function(word, j) {
        var wb = document.getElementById('wb-' + j); if (!wb) return;
        var doneKey = currentCourse.id + '_' + word.word_id, mastery = XHZ.getWordMastery(word.word_id);
        wb.className = 'word-btn' + (j === i ? ' active' : '') + (doneSet[doneKey] ? ' done' : '') + (mastery ? ' status-' + mastery.status : '');
    });
    var word = words[i]; if (!word) return;
    var result = XHZ.markSeen(word.word_id);
    if (result && result.statusChanged) {
        refreshWordButton(i);
        updateCourseTabsProgress();
        checkForNewUnlocks();
    }
    updateLeftPanel(i);
    setTimeout(function() {
        if (idx !== i) return;
        var watchHidden = document.getElementById('panel-watch').classList.contains('mobile-hidden');
        var writeHidden = document.getElementById('panel-write').classList.contains('mobile-hidden');
        if (window.innerWidth > 600) { initAnimWriter(i); initQuizWriter(i); }
        else { if (!watchHidden) initAnimWriter(i); if (!writeHidden) initQuizWriter(i); }
    }, 50);
}

function refreshWordButton(i) {
    var words = getThemeWords(), word = words[i]; if (!word) return;
    var wb = document.getElementById('wb-' + i), doneKey = currentCourse.id + '_' + word.word_id;
    var mastery = XHZ.getWordMastery(word.word_id);
    if (wb) wb.className = 'word-btn' + (i === idx ? ' active' : '') + (doneSet[doneKey] ? ' done' : '') + (mastery ? ' status-' + mastery.status : '');
}

function updateLeftPanel(i) {
    var word = getThemeWords()[i]; if (!word) return;
    var lang = getLang();
    document.getElementById('char-pinyin').textContent = word.py;
    document.getElementById('char-meaning').textContent = lang === 'th' ? word.th : word.en;
    document.getElementById('sent-zh').textContent = word.zh;
    document.getElementById('sent-tr').textContent = lang === 'th' ? word.sent_th : word.sent_en;
    updateToneBadge(word.py);
}

function initAnimWriter(i) {
    var word = getThemeWords()[i]; if (!word) return;
    var box = document.getElementById('anim-box'); if (!box) return;
    var boxWidth = box.clientWidth || box.offsetWidth;
    if (boxWidth <= 0) { setTimeout(function() { if (idx === i) initAnimWriter(i); }, 100); return; }
    if (animW) { try { animW.cancelAnimation(); } catch(e) {} animW = null; }
    box.innerHTML = '';
    var size = boxWidth - 6;
    try {
        animW = HanziWriter.create('anim-box', word.ch, {
            width: size, height: size, padding: 8,
            strokeColor: '#1B7B5E',
            outlineColor: '#D0F0E4', showCharacter: false, showOutline: true,
            strokeAnimationSpeed: 0.8, delayBetweenStrokes: 500, delayBetweenLoops: 1200
        });
        animW.loopCharacterAnimation();
    } catch(e) { console.error('Error creating anim writer:', e); }
}

function initQuizWriter(i) {
    var word = getThemeWords()[i]; if (!word) return;
    var box = document.getElementById('quiz-box'); if (!box) return;
    var boxWidth = box.clientWidth || box.offsetWidth;
    if (boxWidth <= 0) { setTimeout(function() { if (idx === i) initQuizWriter(i); }, 100); return; }
    if (quizW) { try { quizW.cancelQuiz(); } catch(e) {} quizW = null; }
    box.innerHTML = ''; clearCanvas();
    var isBeginner = (mode === 'beginner'), size = boxWidth - 6;
    var canAward = XHZ.canAwardWriteStars(word.word_id);
    if (canAward.reason === 'already_cleared') {
        setMsg('✅ Mastered! Practice for fun 🎉', '#888');
    } else {
        setMsg(t('trace_prompt') || 'Trace the character!', '#888');
    }
    try {
        quizW = HanziWriter.create('quiz-box', word.ch, {
            width: size, height: size, padding: 8,
            showCharacter: isBeginner, charColor: '#CCCCCC',
            showOutline: isBeginner, outlineColor: '#DDDDDD',
            strokeColor: '#222222', drawingColor: 'rgba(0,0,0,0.15)',
            drawingWidth: 2, highlightColor: '#4CAF50', highlightCompleteColor: '#4CAF50', leniency: 1.2
        });
        quizW.quiz({
            onMistake: function() {
                mistakes++; document.getElementById('s-mistakes').textContent = mistakes;
                setMsg(t('stroke_retry') || 'Try again!', '#F44336'); shake(); markLastStroke('wrong');
            },
            onCorrectStroke: function() {
                corrects++; document.getElementById('s-correct').textContent = corrects;
                setMsg(t('stroke_good') || 'Good!', '#4CAF50'); markLastStroke('correct');
            },
            onComplete: function(summary) { if (idx !== i) return; handleQuizComplete(summary, word, i); }
        });
    } catch(e) { console.error('Error creating quiz writer:', e); }
}

function handleQuizComplete(summary, word, i) {
    if (idx !== i) return;
    XHZ.markPracticed(word.word_id);
    var m = summary.totalMistakes, stars = m === 0 ? 3 : m <= 2 ? 2 : 1;
    var msg = m === 0 ? (t('score_perfect') || 'Perfect!') : m <= 2 ? (t('score_great') || 'Great!') : (t('score_keep_trying') || 'Keep trying!');
    var doneKey = currentCourse.id + '_' + word.word_id; doneSet[doneKey] = true;
    var scoreResult = XHZ.addScore('write', stars, [word.word_id]);
    var todayScore = XHZ.getTodayScore();
    document.getElementById('s-stars').textContent = todayScore ? (todayScore.write_score + todayScore.study_score) : '0';
    if (stars === 3) XHZ.markWriteCleared(word.word_id);
    refreshWordButton(i);
    showStars(stars);
    var mastery = XHZ.getWordMastery(word.word_id);
    if (mastery && mastery.status === 'mastered') {
        setMsg('✅ ' + msg + ' Keep it up! 🎉', stars === 3 ? '#1B7B5E' : '#4CAF50');
    } else {
        setMsg(msg, stars === 3 ? '#1B7B5E' : '#4CAF50');
    }
    var wb = document.getElementById('wb-' + i);
    if (wb) wb.className = 'word-btn active done' + (mastery ? ' status-' + mastery.status : '');
    if (scoreResult && scoreResult.newBadgeUnlocked) {
        setTimeout(function() { showBadgePopup(scoreResult.badgeInfo); }, 800);
    }
    if (scoreResult && scoreResult.newItemUnlocked) {
        setTimeout(function() { showItemPopup(scoreResult.newItemUnlocked); }, 1400);
    }
    setTimeout(function() { if (idx === i) { clearCanvas(); initQuizWriter(i); } }, 2500);
}

function showBadgePopup(badgeInfo) {
    if (!badgeInfo) return;
    document.getElementById('badge-popup-emoji').textContent = badgeInfo.emoji;
    document.getElementById('badge-popup-title').textContent = '🎉 New Badge: ' + badgeInfo.label + '!';
    document.getElementById('badge-popup-sub').textContent = 'You earned this today. Keep it up! 🐼';
    document.getElementById('badge-popup-overlay').classList.add('visible');

function closeBadgePopup() { document.getElementById('badge-popup-overlay').classList.remove('visible'); }
function showItemPopup(item) {
    if (!item) return;
    document.getElementById('badge-popup-emoji').textContent = item.emoji || '🎁';
    document.getElementById('badge-popup-title').textContent = '🎁 New Item Unlocked!';
    document.getElementById('badge-popup-sub').textContent = item.message || ('You unlocked ' + item.label + '!');

// ============================================
// TONE / PINYIN UTILS
// ============================================

function getToneNumber(pinyin) { if (/[āēīōūǖ]/.test(pinyin)) return 1; if (/[áéíóúǘ]/.test(pinyin)) return 2; if (/[ǎěǐǒǔǚ]/.test(pinyin)) return 3; if (/[àèìòùǜ]/.test(pinyin)) return 4; return 0; }
var TONE_LABELS = { 0:{symbol:'·',cls:'tone-0'}, 1:{symbol:'—',cls:'tone-1'}, 2:{symbol:'↗',cls:'tone-2'}, 3:{symbol:'↙↗',cls:'tone-3'}, 4:{symbol:'↘',cls:'tone-4'} };
function updateToneBadge(pinyin) { var n = getToneNumber(pinyin), info = TONE_LABELS[n], el = document.getElementById('tone-badge'); if (!el) return; el.textContent = info.symbol; el.className = 'tone-badge ' + info.cls; }
function stripTones(py) { return py.replace(/[āáǎà]/g,'a').replace(/[ēéěè]/g,'e').replace(/[īíǐì]/g,'i').replace(/[ōóǒò]/g,'o').replace(/[ūúǔù]/g,'u').replace(/[ǖǘǚǜ]/g,'v').toLowerCase().trim(); }
function normalizeChinese(str) { return str.replace(/[\s，。！？、：；""''·]/g,'').trim(); }
function levenshteinDistance(s1,s2) { var len1=s1.length,len2=s2.length,matrix=[]; for(var i=0;i<=len1;i++) matrix[i]=[i]; for(var j=0;j<=len2;j++) matrix[0][j]=j; for(var i=1;i<=len1;i++) for(var j=1;j<=len2;j++){var cost=s1[i-1]===s2[j-1]?0:1; matrix[i][j]=Math.min(matrix[i-1][j]+1,matrix[i][j-1]+1,matrix[i-1][j-1]+cost);} return matrix[len1][len2]; }
function isSimilarPinyin(heard,target) { var h=stripTones(heard),t=stripTones(target); return h===t||(h.length>1&&t.length>1&&levenshteinDistance(h,t)<=1); }

function gradeRecognitionResult(results, targetChar, targetPinyin) {
    var bestGrade=0, bestHeard='', targetNorm=normalizeChinese(targetChar), targetPyPlain=stripTones(targetPinyin);
    for(var i=0;i<results.length;i++){
        var transcript=results[i].transcript, heard=normalizeChinese(transcript), heardLow=heard.toLowerCase();
        if(heard.indexOf(targetNorm)!==-1) return {grade:3,heard:transcript};
        if(heardLow===targetPinyin.toLowerCase()||heardLow===targetPyPlain||isSimilarPinyin(heardLow,targetPinyin)){if(bestGrade<2){bestGrade=2;bestHeard=transcript;}}
        if(heard.length>0&&bestGrade<1){bestGrade=1;bestHeard=transcript;}
    }
    return {grade:bestGrade,heard:bestHeard};
}

// ============================================
// CANVAS (handwriting overlay)
// ============================================

function initCanvas() {
    canvas = document.getElementById('handwriting-canvas'); ctx = canvas.getContext('2d');
    resizeCanvas(); window.addEventListener('resize', resizeCanvas);
    var wrapper = document.getElementById('quiz-wrapper');
    wrapper.addEventListener('mousedown', onDrawStart); wrapper.addEventListener('mousemove', onDrawMove);
    wrapper.addEventListener('mouseup', onDrawEnd); wrapper.addEventListener('mouseleave', onDrawEnd);
    wrapper.addEventListener('touchstart', onTouchStart, {passive:true});
    wrapper.addEventListener('touchmove', onTouchMove, {passive:true});
    wrapper.addEventListener('touchend', onTouchEnd, {passive:true});
}

function resizeCanvas() {
    if(!canvas) return;
    var wrapper=document.getElementById('quiz-wrapper'); if(!wrapper) return;
    var size=wrapper.clientWidth-6; if(size<=0) return;
    if(canvas.width!==size||canvas.height!==size){canvas.width=size;canvas.height=size;}
    redrawCanvas();
}

function getCanvasPos(clientX,clientY){var rect=canvas.getBoundingClientRect(),scaleX=canvas.width/rect.width,scaleY=canvas.height/rect.height;return{x:(clientX-rect.left)*scaleX,y:(clientY-rect.top)*scaleY};}
function onTouchStart(e){var p=getCanvasPos(e.touches[0].clientX,e.touches[0].clientY);startDraw(p.x,p.y);}
function onTouchMove(e){if(!isDrawing)return;var p=getCanvasPos(e.touches[0].clientX,e.touches[0].clientY);moveDraw(p.x,p.y);}
function onTouchEnd(){endDraw();}
function onDrawStart(e){var p=getCanvasPos(e.clientX,e.clientY);startDraw(p.x,p.y);}
function onDrawMove(e){if(!isDrawing)return;var p=getCanvasPos(e.clientX,e.clientY);moveDraw(p.x,p.y);}
function onDrawEnd(){endDraw();}
function startDraw(x,y){isDrawing=true;currentPoints=[{x:x,y:y}];}

function moveDraw(x,y){
    if(!isDrawing)return;
    currentPoints.push({x:x,y:y});redrawCanvas();
    drawSmoothPath(currentPoints,'#1a1a1a',3.5,1.0);
}

function endDraw(){
    if(!isDrawing)return;isDrawing=false;
    if(currentPoints.length<3){currentPoints=[];return;}
    canvasStrokes.push({points:currentPoints.slice(),color:'#1a1a1a',alpha:1.0,status:'pending'});
    currentPoints=[];redrawCanvas();
}

function drawSmoothPath(points,color,lineWidth,alpha){
    if(!ctx||points.length<2)return;
    ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle=color;ctx.lineWidth=lineWidth;
    ctx.lineCap='round';ctx.lineJoin='round';ctx.shadowColor=color;ctx.shadowBlur=1.5;
    ctx.beginPath();ctx.moveTo(points[0].x,points[0].y);
    for(var i=1;i<points.length-1;i++){var mx=(points[i].x+points[i+1].x)/2,my=(points[i].y+points[i+1].y)/2;ctx.quadraticCurveTo(points[i].x,points[i].y,mx,my);}
    ctx.lineTo(points[points.length-1].x,points[points.length-1].y);ctx.stroke();ctx.restore();
}

function redrawCanvas(){
    if(!ctx)return;ctx.clearRect(0,0,canvas.width,canvas.height);
    canvasStrokes.forEach(function(s){drawSmoothPath(s.points,s.color,3.5,s.alpha);});
    if(currentPoints.length>1)drawSmoothPath(currentPoints,'#1a1a1a',3.5,1.0);
}

function markLastStroke(result){
    var color=result==='correct'?'#4CAF50':'#F44336';
    for(var i=canvasStrokes.length-1;i>=0;i--){
        if(canvasStrokes[i].status==='pending'){
            canvasStrokes[i].status=result;canvasStrokes[i].color=color;
            redrawCanvas();fadeStroke(canvasStrokes[i],result==='correct'?700:500);break;
        }
    }
}

function fadeStroke(stroke,delayMs){
    setTimeout(function(){
        var step=function(){
            stroke.alpha-=0.05;
            if(stroke.alpha<=0){stroke.alpha=0;var pos=canvasStrokes.indexOf(stroke);if(pos>-1)canvasStrokes.splice(pos,1);}
            redrawCanvas();if(stroke.alpha>0)requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
    },delayMs);
}

function clearCanvas(){canvasStrokes=[];currentPoints=[];isDrawing=false;if(ctx&&canvas)ctx.clearRect(0,0,canvas.width,canvas.height);resizeCanvas();}

function setMicResult(text,state){var el=document.getElementById('mic-result');el.textContent=text;el.className='mic-result'+(state?' '+state:'');}
function resetMicResult(){if(micResultTimer){clearTimeout(micResultTimer);micResultTimer=null;}setMicResult('Tap 🎤 and say the word!','');}
function scheduleMicReset(ms){if(micResultTimer)clearTimeout(micResultTimer);micResultTimer=setTimeout(resetMicResult,ms||6000);}

function clearRecording(){
    if(audioURL){URL.revokeObjectURL(audioURL);audioURL=null;audioBlob=null;}
    audioChunks=[];if(audioPlayer){audioPlayer.pause();audioPlayer=null;}
    var rb=document.getElementById('replay-btn');if(rb)rb.classList.remove('visible','playing');
}

function checkMicSupport(){
    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){var btn=document.getElementById('mic-btn');if(btn)btn.style.display='none';document.getElementById('no-mic-msg').style.display='block';}
}

function toggleListening(){isListening?stopListening():startListening();}

function startListening(){
    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){setMicResult('⚠️ Speech recognition not supported','wrong');return;}
    clearRecording();recognitionDone=false;isListening=true;
    if(recognitionTimeout){clearTimeout(recognitionTimeout);recognitionTimeout=null;}
    var micBtn=document.getElementById('mic-btn');
    if(micBtn){micBtn.classList.add('recording');micBtn.textContent='⏹';}
    setMicResult('🎤 Listening... say the character!','listening');
    startRecognition();
    setTimeout(function(){
        if(!isListening)return;
        navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
            if(!isListening){stream.getTracks().forEach(function(t){t.stop();});return;}
            window._micStream=stream;
            var mimeType=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':MediaRecorder.isTypeSupported('audio/mp4')?'audio/mp4':'';
            try{mediaRecorder=new MediaRecorder(stream,mimeType?{mimeType:mimeType}:{});}catch(e){console.warn('MediaRecorder error:',e);return;}
            audioChunks=[];
            mediaRecorder.ondataavailable=function(e){if(e.data&&e.data.size>0)audioChunks.push(e.data);};
            mediaRecorder.onstop=function(){
                if(audioChunks.length>0){
                    audioBlob=new Blob(audioChunks,{type:mimeType||'audio/webm'});
                    audioURL=URL.createObjectURL(audioBlob);
                    audioPlayer=new Audio(audioURL);
                    audioPlayer.onended=function(){var rb=document.getElementById('replay-btn');if(rb)rb.classList.remove('playing');};
                    var rb=document.getElementById('replay-btn');if(rb)rb.classList.add('visible');
                }
                if(window._micStream)window._micStream.getTracks().forEach(function(t){t.stop();});
            };
            mediaRecorder.start();
        }).catch(function(err){console.warn('MediaRecorder setup failed:',err.message);});
    },150);
}

function startRecognition(){
    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return;
    recognition=new SR();recognition.lang='zh-CN';recognition.continuous=false;
    recognition.interimResults=true;recognition.maxAlternatives=10;
    var hasProcessedFinal=false,speechDetected=false;
    recognition.onspeechstart=function(){speechDetected=true;if(recognitionTimeout){clearTimeout(recognitionTimeout);recognitionTimeout=null;}setMicResult('🎤 Hearing you...','listening');};
    recognition.onresult=function(event){
        var word=getThemeWords()[idx];if(!word)return;
        speechDetected=true;if(recognitionTimeout){clearTimeout(recognitionTimeout);recognitionTimeout=null;}
        var finalResults=[],interimText='';
        for(var i=event.resultIndex;i<event.results.length;i++){
            var result=event.results[i];
            if(result.isFinal){for(var j=0;j<result.length;j++)finalResults.push({transcript:result[j].transcript,confidence:result[j].confidence});}
            else interimText+=result[0].transcript;
        }
        if(interimText&&!hasProcessedFinal)setMicResult('🎤 Hearing: "'+interimText+'"...','listening');
        if(finalResults.length>0&&!hasProcessedFinal){
            hasProcessedFinal=true;recognitionDone=true;
            var gradeResult=gradeRecognitionResult(finalResults,word.ch,word.py);
            showMicGrade(gradeResult.grade,gradeResult.heard,word.ch);stopListening();
        }
    };
    recognition.onend=function(){
        if(recognitionTimeout){clearTimeout(recognitionTimeout);recognitionTimeout=null;}
        setTimeout(function(){
            if(!recognitionDone&&isListening){setMicResult(speechDetected?"🤔 Couldn't understand. Tap 🎤 and try again!":"🤔 No speech heard. Tap 🎤 and speak!",'wrong');scheduleMicReset(6000);}
            stopListening();
        },200);
    };
    recognition.onnomatch=function(){if(!recognitionDone){setMicResult("🤔 No match found. Try speaking more clearly!",'wrong');scheduleMicReset(6000);}stopListening();};
    recognition.onerror=function(e){
        if(recognitionTimeout){clearTimeout(recognitionTimeout);recognitionTimeout=null;}
        if(recognitionDone)return;
        var msg;
        switch(e.error){
            case 'not-allowed':msg='🚫 Microphone access denied.';break;
            case 'no-speech':msg='🤔 No speech detected. Tap 🎤 and speak!';break;
            case 'network':msg='⚠️ Network error. Speech recognition needs internet.';break;
            case 'audio-capture':msg='🎤 No microphone found.';break;
            case 'aborted':stopListening();return;
            default:msg='⚠️ Error: '+e.error;
        }
        setMicResult(msg,'wrong');scheduleMicReset(6000);stopListening();
    };
    recognition.onspeechend=function(){setTimeout(function(){if(recognition&&!recognitionDone){try{recognition.stop();}catch(e){}}},1500);};
    try{
        recognition.start();
        recognitionTimeout=setTimeout(function(){if(isListening&&!recognitionDone&&!speechDetected){setMicResult('⏱️ No speech detected. Tap 🎤 to try again.','wrong');scheduleMicReset(5000);stopListening();}},8000);
    }catch(e){setMicResult('⚠️ Could not start microphone: '+e.message,'wrong');stopListening();}
}

function stopListening(){
    if(recognitionTimeout){clearTimeout(recognitionTimeout);recognitionTimeout=null;}
    if(recognition){try{recognition.stop();}catch(e){}recognition=null;}
    if(mediaRecorder&&mediaRecorder.state!=='inactive'){try{mediaRecorder.stop();}catch(e){}}
    isListening=false;
    var micBtn=document.getElementById('mic-btn');
    if(micBtn){micBtn.classList.remove('recording');micBtn.textContent='🎤';}
}

function playbackRecording(){
    if(!audioPlayer)return;
    var rb=document.getElementById('replay-btn');
    audioPlayer.pause();audioPlayer.currentTime=0;rb.classList.add('playing');
    audioPlayer.play().catch(function(){rb.classList.remove('playing');setMicResult('⚠️ Could not play recording.','wrong');});
}

function showMicGrade(grade,heard,target){
    var word=getThemeWords()[idx];if(!word)return;
    var pinyin=word.py,meaning=getLang()==='th'?word.th:word.en;
    switch(grade){
        case 3:
            setMicResult('🎉 Perfect! "'+target+'" ('+pinyin+') = '+meaning,'correct');
            var py=document.getElementById('char-pinyin');
            if(py){py.classList.remove('pop');void py.offsetWidth;py.classList.add('pop');}
            setTimeout(speakWord,400);
            var micResult=XHZ.addScore('study',1,[word.word_id]);
            if(micResult&&micResult.newItemUnlocked){setTimeout(function(){showItemPopup(micResult.newItemUnlocked);},1000);}
            break;
        case 2:
            setMicResult('👍 Close! I heard "'+heard+'" - try matching the tone of "'+target+'"','correct');
            setTimeout(speakWord,600);break;
        case 1:setMicResult('❌ I heard "'+heard+'" — say "'+target+'" ('+pinyin+')','wrong');break;
        default:setMicResult('🤔 No speech heard. Tap 🎤 and say "'+target+'" ('+pinyin+')','wrong');
    }
    scheduleMicReset(8000);
}
</script>

        var watchHidden = document.getElementById('panel-watch').classList.contains('mobile-hidden');

        if (window.innerWidth > 768) { initAnimWriter(idx); initQuizWriter(idx); }
        else { if (!watchHidden) initAnimWriter(idx); if (!writeHidden) initQuizWriter(idx); }
    }, 50);
});
