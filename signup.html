<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🐼 学汉字 — Join the Waitlist</title>
  <script src="nav.js"></script>
  <script src="strings.js"></script>
  <style>
    /* ── Reset & base ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:   #FF8C42;
      --brand2:  #FFB347;
      --dark:    #1a1a2e;
      --mid:     #2e2e4a;
      --text:    #f0f0f0;
      --muted:   #aaaacc;
      --card:    #26263f;
      --radius:  16px;
      --shadow:  0 4px 24px rgba(0,0,0,0.35);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Nav strip (reuse app nav style) ───────────────────── */
    #app-nav { position: sticky; top: 0; z-index: 100; }

    /* ── Page wrapper ───────────────────────────────────────── */
    .page {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 20px 80px;
    }

    /* ── Hero ───────────────────────────────────────────────── */
    .hero {
      text-align: center;
      padding: 56px 16px 40px;
    }

    .hero-panda {
      font-size: 72px;
      line-height: 1;
      margin-bottom: 20px;
      display: block;
      animation: floatPanda 3s ease-in-out infinite;
    }

    @keyframes floatPanda {
      0%, 100% { transform: translateY(0);    }
      50%       { transform: translateY(-8px); }
    }

    .hero h1 {
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      font-weight: 800;
      line-height: 1.3;
      white-space: pre-line;
      color: #fff;
      margin-bottom: 16px;
    }

    .hero h1 em {
      font-style: normal;
      color: var(--brand);
    }

    .hero-sub {
      font-size: 1rem;
      color: var(--muted);
      max-width: 420px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── Feature cards ──────────────────────────────────────── */
    .features {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin: 40px 0;
    }

    @media (min-width: 540px) {
      .features { grid-template-columns: 1fr 1fr 1fr; }
    }

    .feat-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 22px 18px;
      position: relative;
      box-shadow: var(--shadow);
      transition: transform 0.2s;
    }

    .feat-card:hover { transform: translateY(-3px); }

    .feat-card.soon {
      opacity: 0.75;
    }

    .feat-icon {
      font-size: 2rem;
      margin-bottom: 10px;
      display: block;
    }

    .feat-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }

    .feat-desc {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .coming-soon-badge {
      display: inline-block;
      background: var(--brand);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 999px;
      margin-top: 8px;
    }

    /* ── Sign-up card ───────────────────────────────────────── */
    .signup-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 36px 32px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.07);
    }

    .signup-card h2 {
      font-size: 1.4rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 8px;
    }

    .signup-card .form-sub {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    /* ── Form elements ──────────────────────────────────────── */
    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: var(--mid);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
      -webkit-appearance: none;
    }

    .form-group input::placeholder {
      color: #666688;
    }

    .form-group input:focus {
      border-color: var(--brand);
    }

    .form-group input.error {
      border-color: #f44336;
    }

    .field-error {
      font-size: 0.78rem;
      color: #f44336;
      margin-top: 5px;
      display: none;
    }

    .field-error.visible { display: block; }

    /* ── Submit button ──────────────────────────────────────── */
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--brand);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, opacity 0.2s;
      margin-top: 6px;
      letter-spacing: 0.01em;
    }

    .btn-submit:hover:not(:disabled) {
      background: #e07a35;
      transform: translateY(-1px);
    }

    .btn-submit:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .privacy-note {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      margin-top: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    /* ── Thank-you state ────────────────────────────────────── */
    #thank-you {
      display: none;
      text-align: center;
      padding: 12px 0;
    }

    #thank-you .ty-emoji {
      font-size: 3.5rem;
      display: block;
      margin-bottom: 16px;
    }

    #thank-you h2 {
      font-size: 1.5rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 12px;
    }

    #thank-you p {
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.6;
      max-width: 360px;
      margin: 0 auto 28px;
    }

    .btn-open-app {
      display: inline-block;
      padding: 13px 28px;
      background: var(--brand);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      border-radius: 12px;
      text-decoration: none;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-open-app:hover {
      background: #e07a35;
      transform: translateY(-1px);
    }

    /* ── Footer links ───────────────────────────────────────── */
    .footer-links {
      text-align: center;
      margin-top: 32px;
    }

    .footer-links p {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .link-back {
      display: inline-block;
      font-size: 0.85rem;
      color: var(--brand);
      text-decoration: none;
      padding: 6px 0;
      transition: color 0.2s;
    }

    .link-back:hover { color: var(--brand2); }

    /* ── Divider ────────────────────────────────────────────── */
    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.08);
      margin: 36px 0;
    }

    /* ── Error banner ───────────────────────────────────────── */
    #submit-error {
      display: none;
      background: rgba(244,67,54,0.15);
      border: 1px solid rgba(244,67,54,0.4);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.85rem;
      color: #ff8a80;
      margin-bottom: 18px;
      text-align: center;
    }

    #submit-error.visible { display: block; }

    /* ── Mobile tweaks ──────────────────────────────────────── */
    @media (max-width: 480px) {
      .signup-card { padding: 28px 20px; }
      .hero        { padding: 40px 8px 32px; }
    }
  </style>
</head>
<body>

  <div id="app-nav"></div>

  <div class="page">

    <!-- ── Hero ───────────────────────────────────────────── -->
    <section class="hero">
      <span class="hero-panda">🐼</span>
      <h1 id="hero-title"></h1>
      <p class="hero-sub" data-i18n="signup_hero_sub"></p>
    </section>

    <!-- ── Features ───────────────────────────────────────── -->
    <div class="features">

      <div class="feat-card">
        <span class="feat-icon">✍️</span>
        <div class="feat-title" data-i18n="signup_feat1_title"></div>
        <div class="feat-desc"  data-i18n="signup_feat1_desc"></div>
      </div>

      <div class="feat-card">
        <span class="feat-icon">📈</span>
        <div class="feat-title" data-i18n="signup_feat2_title"></div>
        <div class="feat-desc"  data-i18n="signup_feat2_desc"></div>
      </div>

      <div class="feat-card soon">
        <span class="feat-icon">🎮</span>
        <div class="feat-title" data-i18n="signup_feat3_title"></div>
        <div class="feat-desc"  data-i18n="signup_feat3_desc"></div>
        <span class="coming-soon-badge" data-i18n="signup_coming_soon"></span>
      </div>

    </div>

    <!-- ── Sign-up card ────────────────────────────────────── -->
    <div class="signup-card">

      <!-- Form state -->
      <div id="form-state">
        <h2 data-i18n="signup_form_title"></h2>
        <p class="form-sub" data-i18n="signup_form_sub"></p>

        <div id="submit-error">
          Something went wrong. Please try again.
        </div>

        <!-- Netlify honeypot + hidden form-name -->
        <form
          name="waitlist"
          method="POST"
          data-netlify="true"
          netlify-honeypot="bot-field"
          id="waitlist-form"
          novalidate
        >
          <input type="hidden" name="form-name" value="waitlist"/>
          <p style="display:none;">
            <input name="bot-field" tabindex="-1" autocomplete="off"/>
          </p>

          <div class="form-group">
            <label for="field-name" data-i18n="signup_name_label"></label>
            <input
              type="text"
              id="field-name"
              name="name"
              autocomplete="name"
              spellcheck="false"
            />
            <div class="field-error" id="err-name">Please enter your name.</div>
          </div>

          <div class="form-group">
            <label for="field-email" data-i18n="signup_email_label"></label>
            <input
              type="email"
              id="field-email"
              name="email"
              autocomplete="email"
              inputmode="email"
            />
            <div class="field-error" id="err-email">Please enter a valid email address.</div>
          </div>

          <button type="submit" class="btn-submit" id="btn-submit">
            <span data-i18n="signup_submit"></span>
          </button>

          <p class="privacy-note">
            🔒 <span data-i18n="signup_privacy"></span>
          </p>

        </form>
      </div>

      <!-- Thank-you state -->
      <div id="thank-you">
        <span class="ty-emoji">🎉</span>
        <h2 data-i18n="signup_thanks_title"></h2>
        <p  data-i18n="signup_thanks_body"></p>
        <a href="index.html" class="btn-open-app" data-i18n="signup_open_app"></a>
      </div>

    </div>

    <hr class="divider"/>

    <!-- ── Footer links ────────────────────────────────────── -->
    <div class="footer-links">
      <p data-i18n="signup_already"></p>
      <a href="index.html" class="link-back" data-i18n="signup_go_back"></a>
    </div>

    <!-- ── Ko-fi ── -->
<div style="text-align:center; margin-top:8px; padding-bottom:16px;">
    <p style="font-size:0.78em; color:#666688; margin-bottom:10px; line-height:1.6;">
        学汉字 is free and made by one person,<br/>
        for kids who'd rather swipe than write on paper. 🐼
    </p>
    <a href='https://ko-fi.com/D1D41XCDKQ' target='_blank'>
        <img height='36' style='border:0px;height:36px;' 
             src='https://storage.ko-fi.com/cdn/kofi6.png?v=6' 
             border='0' alt='Buy Me a Coffee at ko-fi.com'/>
    </a>
</div>

  </div><!-- /page -->

  <script>
  document.addEventListener('DOMContentLoaded', function () {

    // ── Nav (no active tab — this is outside the main nav) ──
    initNav('index', { hideLinks: true });
    refreshStrings();
    renderHeroTitle();

    // ── Hero title — preserve line break from string ─────────
    function renderHeroTitle() {
      var raw = t('signup_hero_title');
      var el  = document.getElementById('hero-title');
      if (!el) return;
      // Highlight "Every day" in brand colour
      el.innerHTML = raw
        .split('\n')
        .map(function(line, i) {
          return i === 1
            ? '<em>' + escHtml(line) + '</em>'
            : escHtml(line);
        })
        .join('<br/>');
    }

    function escHtml(str) {
      return str
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;');
    }

    // ── Re-render on language change ─────────────────────────
    onLangChange(function() {
      refreshStrings();
      renderHeroTitle();
      updatePlaceholders();
    });

    function updatePlaceholders() {
      document.getElementById('field-name').placeholder  = t('signup_name_ph');
      document.getElementById('field-email').placeholder = t('signup_email_ph');
    }

    updatePlaceholders();

    // ── Form submission ───────────────────────────────────────
    var form      = document.getElementById('waitlist-form');
    var btnSubmit = document.getElementById('btn-submit');
    var errBanner = document.getElementById('submit-error');

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      // Clear previous errors
      clearErrors();

      var nameVal  = document.getElementById('field-name').value.trim();
      var emailVal = document.getElementById('field-email').value.trim();
      var valid    = true;

      if (!nameVal) {
        showFieldError('err-name', 'field-name');
        valid = false;
      }

      if (!emailVal || !isValidEmail(emailVal)) {
        showFieldError('err-email', 'field-email');
        valid = false;
      }

      if (!valid) return;

      // Disable button, show loading state
      btnSubmit.disabled = true;
      btnSubmit.querySelector('span').textContent = t('signup_submitting');

      // Submit to Netlify via fetch
      var formData = new FormData(form);

      fetch('/', {
        method:  'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body:    new URLSearchParams(formData).toString()
      })
      .then(function(res) {
        if (res.ok) {
          showThankYou();
        } else {
          throw new Error('Network response not ok: ' + res.status);
        }
      })
      .catch(function(err) {
        console.error('Form submission error:', err);
        btnSubmit.disabled = false;
        btnSubmit.querySelector('span').textContent = t('signup_submit');
        errBanner.classList.add('visible');
        window.scrollTo({ top: errBanner.offsetTop - 20, behavior: 'smooth' });
      });
    });

    function showThankYou() {
      document.getElementById('form-state').style.display = 'none';
      var ty = document.getElementById('thank-you');
      ty.style.display = 'block';
      // Scroll thank-you into view
      ty.scrollIntoView({ behavior: 'smooth', block: 'center' });
      localStorage.setItem('xhz_waitlisted', 'true');
    }

    function showFieldError(errId, inputId) {
      document.getElementById(errId).classList.add('visible');
      document.getElementById(inputId).classList.add('error');
    }

    function clearErrors() {
      errBanner.classList.remove('visible');
      ['err-name','err-email'].forEach(function(id) {
        document.getElementById(id).classList.remove('visible');
      });
      ['field-name','field-email'].forEach(function(id) {
        document.getElementById(id).classList.remove('error');
      });
    }

    function isValidEmail(str) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(str);
    }

  });
  </script>

</body>
</html>
