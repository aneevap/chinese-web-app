<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>学汉字 Learn Chinese</title>
<script src="nav.js"></script><script src="profiles.js"></script><script src="shared/supabase-client.js"></script><script src="shared/supabase-sync.js"></script><script src="strings.js"></script>
<script src="shared/auth-modal.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<link rel="stylesheet" href="shared/design-system.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@400;600;700;800&family=ZCOOL+KuaiLe&family=Nunito:wght@400;700;800&family=Mali:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #FAFAF5;
  --cream-border: var(--paper-deep);
  --card-yellow: var(--botes-mustard);
  --card-yellow-light: #FDF8D0;
  --card-yellow-soft: #FFF9E0;
  --teal: var(--botes-sage);
  --teal-light: #D0F0E4;
  --teal-dark: var(--botes-sage-deep);
  --correct: var(--botes-sage);
  --wrong: var(--botes-coral);
  --pink-light: #FDDEDE;
  --mint-light: #D4F5E4;
  --radius-lg: var(--card-radius);
  --radius-md: 16px;
  --radius-sm: 12px;
  --shadow-btn: 0 4px 12px var(--theme-color)55;
  --safe-top: env(safe-area-inset-top,0px);
  --safe-bottom: env(safe-area-inset-bottom,0px);
  --theme-color: var(--botes-sage);
  --theme-color-light: #D0F0E4;
  --theme-color-pale: #F2F1EC;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body {
  font-family: var(--font-main);
  background: var(--paper-cream);
  background-image: url('../assets/textures/paper-grain.png');
  background-repeat: repeat;
  background-size: auto;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  color: var(--ink-medium);
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
}
.loading-screen {
  position: fixed; inset: 0;
  background: var(--paper-cream);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 999; gap: 16px;
  font-size: 1em; color: var(--ink-light);
  font-weight: 700;
}
.loading-spinner {
  width: 44px; height: 44px;
  border: 4px solid var(--theme-color-pale);
  border-top-color: var(--theme-color);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* MOBILE TABS */
.mobile-tabs {
  display: none;
  background: var(--paper-cool);
  padding: 10px 16px; gap: 10px; z-index: 10;
}
.m-tab-btn {
  flex: 1; padding: 14px 10px;
  border-radius: var(--radius-pill);
  border: 2px solid var(--theme-color-light);
  font-weight: 800; font-size: .9em;
  background: #FAFAF5;
  color: var(--theme-color);
  cursor: pointer; transition: all .2s;
  min-height: 48px;
  font-family: var(--font-main);
}
.m-tab-btn.active {
  background: var(--theme-color);
  color: #FAFAF5;
  border-color: var(--theme-color);
  box-shadow: var(--shadow-btn);
}

/* GUEST BANNER */
.guest-banner {
  background: var(--paper-warm);
  border-bottom: 2px solid var(--botes-ochre);
  padding: 10px 16px;
  display: flex; align-items: center;
  justify-content: space-between; gap: 10px;
  font-size: .78em; color: var(--ink-medium);
  flex-shrink: 0; font-weight: 700;
}
.guest-banner button {
  background: var(--botes-ochre);
  color: #FAFAF5;
  border: none;
  border-radius: var(--radius-pill);
  padding: 8px 16px;
  font-size: .85em; font-weight: 800;
  cursor: pointer; white-space: nowrap;
  min-height: 44px;
}
.guest-banner .dismiss {
  background: transparent;
  color: var(--ink-light);
  font-size: 1.3em;
  padding: 0 8px;
  min-width: 44px; min-height: 44px;
  display: flex; align-items: center; justify-content: center;
}

/* MAIN LAYOUT */
.main-content{display:flex;flex-direction:column;flex:1;padding:12px 16px;gap:10px;overflow-y:auto;overflow-x:hidden;min-height:0;align-items:center}
/* INFO STRIP */
.info-strip {
  width: 100%; max-width: 880px;
  background: var(--cream);
  border: 1px solid var(--paper-deep);
  border-radius: var(--radius-md);
  padding: 10px 14px;
  display: flex; align-items: center; gap: 14px;
  flex-shrink: 0;
  box-shadow: var(--shadow-soft);
}
.info-strip-thumb {
  flex-shrink: 0;
  width: 96px; height: 96px;
  border-radius: var(--radius-sm);
  background: var(--cream);
  border: 1px solid var(--paper-deep);
  position: relative; overflow: hidden;
}
.info-strip-thumb #anim-box{width:100%;height:100%}
.info-strip-thumb .crosshair{border-radius:var(--radius-sm)}
.info-strip-info{flex:1;display:flex;flex-direction:column;gap:4px;min-width:0}
.info-strip-row1{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pinyin-text{font-size:1.35em;color:var(--ink-dark);font-weight:900}
.tone-badge{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;font-size:.65em;font-weight:800;flex-shrink:0}
.tone-1{background:#DBEAFE;color:#1D4ED8}.tone-2{background:#D1FAE5;color:#065F46}.tone-3{background:#FEF3C7;color:#92400E}.tone-4{background:#FEE2E2;color:#991B1B}.tone-0{background:#F3F4F6;color:#9CA3AF}
.meaning-text{font-size:1em;color:var(--ink-medium);font-weight:800;line-height:1.2}
.icon-btn {
  background: var(--cream);
  border: 1px solid var(--paper-deep);
  border-radius: 50%;
  width: 40px; height: 40px;
  font-size: 1em;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
  flex-shrink: 0;
}
.icon-btn:active {
  transform: scale(0.9);
  background: var(--theme-color-light);
}
.icon-btn.speaking {
  background: var(--theme-color);
  color: var(--cream);
  border-color: var(--theme-color);
  animation: pulse .6s infinite alternate;
}
.icon-btn.recording {
  background: var(--wrong);
  color: var(--cream);
  border-color: var(--wrong);
  animation: pulse .6s infinite alternate;
}
@keyframes pulse{from{transform:scale(1);box-shadow:0 0 0 rgba(255,100,66,0.4)}to{transform:scale(1.1);box-shadow:0 0 8px rgba(255,100,66,0.5)}}

.mic-result {
  width: 100%;
  background: var(--cream);
  border-radius: var(--radius-sm);
  padding: 6px 12px;
  font-size: .78em; color: var(--ink-medium);
  text-align: center;
  border: 1px solid var(--paper-deep);
  transition: all .3s;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; min-height: 34px;
  font-weight: 700;
}
.mic-result.correct {
  background: var(--mint-light);
  border-color: var(--correct);
  color: #065F46;
}
.mic-result.wrong {
  background: var(--pink-light);
  border-color: var(--wrong);
  color: #991B1B;
}
.mic-result.listening {
  background: #FEF3C7;
  border-color: #F59E0B;
  color: #92400E;
}
.replay-btn {
  background: var(--theme-color-light);
  border: none;
  border-radius: var(--radius-pill);
  padding: 4px 12px;
  font-size: .7em; font-weight: 800;
  color: var(--theme-color);
  cursor: pointer;
  display: none; align-items: center; gap: 4px;
  min-height: 30px;
  transition: background .2s;
  flex-shrink: 0;
}
.replay-btn.visible { display: flex; }
.replay-btn.playing {
  background: var(--theme-color);
  color: var(--cream);
  animation: pulse .6s infinite alternate;
}

/* CANVAS STAGE */
.canvas-stage {
  width: 100%; max-width: 880px;
  background: var(--cream);
  border-radius: var(--radius-lg);
  padding: 18px;
  display: flex; flex-direction: column;
  align-items: center; gap: 10px;
  box-shadow: var(--shadow-card);
  flex: 0 0 auto;
  min-height: 340px;
  position: relative; overflow: visible;
}
.canvas-stage-header { position: absolute; top: 14px; right: 14px; z-index: 5; }
.mode-toggle {
  display: flex;
  background: var(--paper-cool);
  border-radius: var(--radius-pill);
  padding: 3px; gap: 0;
}
.mode-btn {
  padding: 0; width: 40px; height: 40px;
  border: none;
  background: transparent;
  color: var(--ink-light);
  border-radius: 50%;
  font-size: 1.1em; font-weight: 800;
  cursor: pointer; transition: all .2s;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.mode-btn.active {
  background: var(--theme-color);
  color: var(--cream);
  box-shadow: var(--shadow-btn);
}
.mode-btn::after {
  content: attr(data-tooltip);
  position: absolute; bottom: -28px;
  left: 50%; transform: translateX(-50%);
  background: var(--ink-dark);
  color: var(--cream);
  font-size: .55em; padding: 3px 8px;
  border-radius: 6px; white-space: nowrap;
  opacity: 0; pointer-events: none;
  transition: opacity .2s; z-index: 10;
}
.mode-btn:hover::after { opacity: 1; }

.char-box-wrapper{position:relative;flex-shrink:0}
.canvas-stage .char-box-wrapper{width:min(260px,38vmin);height:min(260px,38vmin)}
.char-box {
  width: 100%; height: 100%;
  border-radius: var(--radius-md);
  background: var(--cream);
}
#anim-box { border: none; }
#quiz-box {
  border: 1px solid var(--paper-deep);
  box-shadow: var(--shadow-soft);
}
.crosshair {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  border-radius: var(--radius-md);
  overflow: hidden; z-index: 1;
}
.crosshair::before, .crosshair::after {
  content: '';
  position: absolute;
  background: rgba(74, 56, 40, 0.08);
}
.crosshair::before { top: 50%; left: 0; width: 100%; height: 1px; }
.crosshair::after { left: 50%; top: 0; width: 1px; height: 100%; }
#handwriting-canvas {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  border-radius: var(--radius-md);
  pointer-events: none; z-index: 2;
}

/* SCORE BAR */
.score-bar {
  display: flex; align-items: center;
  justify-content: center; gap: 18px;
  flex-wrap: wrap; width: 100%;
  padding: 4px 0; flex-shrink: 0;
}
.stars-display { font-size: 1.4em; min-height: 1.2em; line-height: 1; }
.score-msg { font-size: .85em; font-weight: 800; color: var(--correct); min-height: 1em; }
.stats-row { display: flex; gap: 16px; }
.stat-item { text-align: center; display: flex; align-items: baseline; gap: 4px; }
.stat-val { font-size: 1.05em; font-weight: 900; color: var(--theme-color); }
.stat-lbl { font-size: .65em; color: var(--ink-light); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }

/* SENTENCE CARD */
.sentence-card {
  width: 100%; max-width: 880px;
  background: var(--card-yellow-soft);
  border: 1px solid #F0E89A;
  border-radius: var(--radius-md);
  padding: 10px 14px;
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
  box-shadow: var(--shadow-soft);
}
.sentence-card .icon-btn {
  width: 36px; height: 36px;
  font-size: .9em;
  background: var(--cream);
  border-color: #F0E89A;
}
.sentence-card-text { flex: 1; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.sentence-zh { font-size: .95em; color: var(--ink-dark); font-weight: 800; }
.sentence-tr { font-size: .78em; color: var(--ink-medium); font-weight: 700; }

.no-mic-msg { font-size: .7em; color: var(--ink-light); text-align: center; flex-shrink: 0; font-weight: 700; }
.section-hidden { display: none !important; }

/* WORD LIST SECTION */
.word-list-section {
  background: var(--cream);
  border-top: none;
  flex-shrink: 0;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  box-shadow: var(--shadow-card);
  padding-bottom: 8px;
}
.picker-row {
  display: flex; gap: 8px;
  padding: 10px 12px 6px;
  align-items: center; flex-wrap: wrap;
}
.picker-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 14px; border: none;
  border-radius: var(--radius-pill);
  font-family: var(--font-main);
  font-size: .85em; font-weight: 800;
  color: var(--ink-dark);
  cursor: pointer; transition: all .2s;
  min-height: 42px; flex-shrink: 0;
}
.picker-btn:active { transform: scale(0.96); }
.picker-btn-emoji { font-size: 1.1em; flex-shrink: 0; }
.picker-btn-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.picker-btn-arrow { font-size: .9em; color: var(--ink-light); flex-shrink: 0; }
.picker-btn-course {
  background: var(--theme-color-light);
  color: var(--theme-color);
}
.picker-btn-course .picker-btn-arrow { color: var(--theme-color); }
.picker-btn-category {
  background: var(--card-yellow);
  color: var(--ink-dark);
  box-shadow: 0 2px 8px rgba(232,197,71,0.3);
}
.picker-btn-category .picker-btn-arrow { color: var(--ink-medium); }

.picker-nav { display: flex; align-items: center; gap: 6px; margin-left: auto; }
.picker-pos { font-size: .78em; font-weight: 800; color: var(--ink-medium); padding: 0 6px; min-width: 38px; text-align: center; }
.page-btn {
  background: var(--paper-cool);
  border: none; border-radius: 50%;
  width: 36px; height: 36px;
  font-size: .95em; color: var(--theme-color);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; transition: all .15s;
  flex-shrink: 0;
}
.page-btn:active { transform: scale(0.9); background: var(--theme-color-light); }
.page-btn:disabled { opacity: .3; cursor: not-allowed; }
.page-dots { display: flex; gap: 4px; align-items: center; padding: 0 4px; }
.page-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--paper-deep);
  transition: all .2s;
  cursor: pointer;
}
.page-dot.active {
  background: var(--theme-color);
  width: 18px;
  border-radius: 4px;
}
.grid-btn {
  background: var(--paper-cool);
  border: none; border-radius: 50%;
  width: 36px; height: 36px;
  font-size: 1em; color: var(--ink-medium);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
  flex-shrink: 0; margin-left: 4px;
}
.grid-btn:active { transform: scale(0.9); background: var(--theme-color-light); }

.course-tabs, .set-tabs { display: none !important; }

.word-list {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 8px;
  padding: 6px 12px 12px;
}
.word-btn {
  height: clamp(58px, 10vw, 68px);
  border: none;
  background: var(--paper-cool);
  border-radius: var(--radius-md);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer;
  font-size: clamp(1.3em, 3.5vw, 1.55em);
  color: var(--ink-dark);
  position: relative;
  transition: all .2s;
  font-weight: 700;
  min-height: 54px;
}
.word-btn .wp { font-size: .32em; color: var(--ink-light); margin-top: 1px; font-weight: 700; }
.word-btn.active {
  background: var(--card-yellow);
  transform: scale(1.05);
  box-shadow: 0 4px 16px rgba(232,197,71,0.5);
}
.word-btn::before {
  content: '';
  position: absolute; bottom: 3px;
  left: 50%; transform: translateX(-50%);
  width: 6px; height: 6px;
  border-radius: 50%; background: transparent;
}
.word-btn.status-seen::before { background: #93C5FD; }
.word-btn.status-practiced::before { background: #FCD34D; }
.word-btn.status-mastered::before { background: var(--correct); }
.word-btn.done::after {
  content: '✓';
  position: absolute; top: -3px; right: -3px;
  background: var(--correct);
  color: white;
  border-radius: 50%;
  width: 16px; height: 16px;
  font-size: .36em;
  line-height: 16px; text-align: center;
  font-weight: 900;
}

/* All chars sheet */
.all-chars-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px; padding: 4px 0;
}
.all-chars-progress {
  margin-top: 14px;
  padding: 10px 12px;
  background: var(--paper-cool);
  border-radius: var(--radius-sm);
  font-size: .78em; font-weight: 800;
  color: var(--ink-medium);
  text-align: center;
}
.all-chars-progress-bar {
  margin-top: 6px;
  height: 6px;
  background: var(--paper-deep);
  border-radius: 3px;
  overflow: hidden;
}
.all-chars-progress-fill {
  height: 100%;
  background: var(--correct);
  border-radius: 3px;
  transition: width .3s;
}

/* SHEETS / POPUPS */
.category-sheet-overlay {
  position: fixed; inset: 0;
  background: rgba(74, 56, 40, 0.4);
  z-index: 500;
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .3s;
}
.category-sheet-overlay.open { opacity: 1; pointer-events: all; }
.category-sheet {
  background: var(--cream);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  width: 100%; max-width: 500px;
  max-height: 75vh;
  padding: 20px 16px 32px;
  padding-bottom: calc(32px + var(--safe-bottom));
  transform: translateY(100%);
  transition: transform .35s cubic-bezier(0.32,0.72,0,1);
  overflow-y: auto;
}
.category-sheet-overlay.open .category-sheet { transform: translateY(0); }
.category-sheet-header {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--paper-deep);
}
.category-sheet-title {
  font-size: 1.1em; font-weight: 900;
  color: var(--ink-dark);
}
.category-sheet-close {
  background: var(--paper-cool);
  border: none; border-radius: 50%;
  width: 44px; height: 44px;
  font-size: 1.1em; color: var(--ink-light);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; transition: all .2s;
}
.category-sheet-close:active {
  transform: scale(0.9);
  background: var(--paper-deep);
}
.category-sheet-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.category-card {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 6px; padding: 16px 8px;
  background: var(--paper-cool);
  border: 3px solid transparent;
  border-radius: var(--radius-md);
  cursor: pointer; transition: all .2s;
  min-height: 80px;
  font-family: var(--font-main);
}
.category-card:active { transform: scale(0.95); }
.category-card.active {
  background: var(--card-yellow-light);
  border-color: var(--card-yellow);
  box-shadow: 0 2px 12px rgba(232,197,71,0.4);
}
.category-card-emoji { font-size: 2em; }
.category-card-label {
  font-size: .75em; font-weight: 800;
  color: var(--ink-dark);
  text-align: center; line-height: 1.2;
}
.course-sheet-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.course-card {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 6px; padding: 18px 12px;
  background: var(--paper-cool);
  border: 3px solid transparent;
  border-radius: var(--radius-md);
  cursor: pointer; transition: all .2s;
  min-height: 90px;
  font-family: var(--font-main);
  position: relative;
}
.course-card:active { transform: scale(0.95); }
.course-card.active {
  background: var(--theme-color-light);
  border-color: var(--theme-color);
  box-shadow: 0 2px 12px rgba(27,123,94,0.2);
}
.course-card.locked { opacity: .5; cursor: not-allowed; }
.course-card.locked:active { transform: none; }
.course-card-emoji { font-size: 2.2em; }
.course-card-label {
  font-size: 1em; font-weight: 900;
  color: var(--ink-dark);
  text-align: center;
}
.course-card-sub {
  font-size: .65em; font-weight: 700;
  color: var(--ink-light);
  text-align: center;
}
.course-card-lock {
  position: absolute; top: 8px; right: 8px;
  font-size: .9em;
}
.course-card-progress {
  width: 80%; height: 4px;
  background: var(--paper-deep);
  border-radius: 2px;
  overflow: hidden; margin-top: 4px;
}
.course-card-progress-fill {
  height: 100%;
  background: var(--theme-color);
  border-radius: 2px;
  transition: width .3s;
}

/* ── BADGE POPUP ── */
.badge-popup-overlay {
  position: fixed; inset: 0;
  background: rgba(74, 56, 40, 0.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
  opacity: 0; pointer-events: none;
  transition: opacity .3s;
}
.badge-popup-overlay.visible { opacity: 1; pointer-events: all; }
.badge-popup {
  background: var(--cream);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  text-align: center;
  max-width: 300px;
  width: 90%;
  box-shadow: var(--shadow-lifted);

}
.badge-popup-overlay.visible .badge-popup { transform: scale(1); }
.badge-popup-emoji { font-size: 3.5em; margin-bottom: 12px; }
.badge-popup-title {

/* ── UNLOCK POPUP ── */
.unlock-popup-overlay {
  position: fixed; inset: 0;

@keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
.unlock-popup-title {
  font-size: 1.4em; font-weight: 900;

}

}
.unlock-popup-btn:active { transform: scale(0.95); }

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}
.shake { animation: shake .3s ease; }
@keyframes pop {

/* RESPONSIVE — MOBILE */
@media (max-width: 600px) {

/* RESPONSIVE — DESKTOP */
@media (min-width: 1025px) {

}

<body>
<div class="loading-screen" id="loading-screen"><div class="loading-spinner"></div><span id="loading-msg">Loading...</span></div>

<div class="mobile-tabs" id="mobile-tabs"><button class="m-tab-btn active" id="m-tab-watch" onclick="switchTab('watch')">📖 STUDY</button><button class="m-tab-btn" id="m-tab-write" onclick="switchTab('write')">✍️ PRACTICE</button></div>
<div class="guest-banner" id="guest-banner" style="display:none;"><span>Progress saved on this device. Cloud sync coming soon!</span><button class="banner-btn" data-i18n="save_my_progress" onclick="showAuthModal('upgrade')"></button><button class="dismiss" onclick="dismissGuestBanner()">✕</button></div>

      <div class="mic-result" id="mic-result">Tap 🎤 and say the word!</div>

  </div>

  <div class="canvas-stage" id="section-practice">

      <div class="mode-toggle">
        <button class="mode-btn active" id="btn-beginner" onclick="setMode('beginner')" data-tooltip="Beginner">🌟</button>
        <button class="mode-btn" id="btn-challenge" onclick="setMode('challenge')" data-tooltip="Challenge">🔥</button>
      </div>
    </div>
    <div class="char-box-wrapper" id="quiz-wrapper">
      <div id="quiz-box" class="char-box"></div>
      <div class="crosshair"></div>

    </div>
    <div class="score-bar">
      <div class="stars-display" id="stars-display"></div>
      <div class="score-msg" id="score-msg" data-i18n="trace_prompt"></div>
      <div class="stats-row">
        <div class="stat-item"><span class="stat-val" id="s-correct">0</span><span class="stat-lbl">Correct</span></div>
        <div class="stat-item"><span class="stat-val" id="s-mistakes">0</span><span class="stat-lbl">Mistakes</span></div>
        <div class="stat-item"><span class="stat-val" id="s-stars">0</span><span class="stat-lbl">Today ⭐</span></div>

  <div class="no-mic-msg" id="no-mic-msg" style="display:none;">🎤 Not supported in this browser.</div>

</div>

<div class="word-list-section">
  <div class="picker-row">
    <button class="picker-btn picker-btn-course" id="course-picker-btn" onclick="openCoursePicker()">
      <span class="picker-btn-emoji" id="course-picker-emoji">📘</span>
      <span class="picker-btn-label" id="course-picker-label">1A</span>
      <span class="picker-btn-arrow">▾</span>
    </button>

      <span class="picker-btn-emoji" id="picker-emoji">🏃</span>
      <span class="picker-btn-label" id="picker-label">Actions</span>

    </button>
    <div class="picker-nav" id="picker-nav">
      <span class="picker-pos" id="picker-pos">1/1</span>
      <button class="page-btn" id="page-prev-btn" onclick="changePage(-1)">‹</button>
      <div class="page-dots" id="page-dots"></div>

</div>

<div class="category-sheet-overlay" id="course-sheet-overlay" onclick="closeCoursePicker()"><div class="category-sheet" onclick="event.stopPropagation()"><div class="category-sheet-header"><span class="category-sheet-title">📚 Pick a Level</span><button class="category-sheet-close" onclick="closeCoursePicker()">✕</button></div><div class="course-sheet-grid" id="course-sheet-grid"></div></div></div>
<div class="category-sheet-overlay" id="category-sheet-overlay" onclick="closeCategoryPicker()"><div class="category-sheet" onclick="event.stopPropagation()"><div class="category-sheet-header"><span class="category-sheet-title">🎯 Pick a Category</span><button class="category-sheet-close" onclick="closeCategoryPicker()">✕</button></div><div class="category-sheet-grid" id="category-sheet-grid"></div></div></div>

  <div class="category-sheet" onclick="event.stopPropagation()">
    <div class="category-sheet-header">
      <span class="category-sheet-title" id="all-chars-title">All characters</span>
      <button class="category-sheet-close" onclick="closeAllCharsSheet()">✕</button>
    </div>
    <div class="all-chars-grid" id="all-chars-grid"></div>
    <div class="all-chars-progress">
      <div id="all-chars-progress-text">0 / 0 mastered</div>
      <div class="all-chars-progress-bar"><div class="all-chars-progress-fill" id="all-chars-progress-fill" style="width:0%"></div></div>
    </div>
  </div>
</div>
<div class="badge-popup-overlay" id="badge-popup-overlay"><div class="badge-popup"><div class="badge-popup-emoji" id="badge-popup-emoji">🏅</div><div class="badge-popup-title" id="badge-popup-title">New Badge!</div><div class="badge-popup-sub" id="badge-popup-sub"></div><button class="badge-popup-btn" onclick="closeBadgePopup()">Keep going! 🐼</button></div></div>
<div class="unlock-popup-overlay" id="unlock-popup-overlay"><div class="unlock-popup"><div class="unlock-popup-emoji" id="unlock-popup-emoji">🎊</div><div class="unlock-popup-title" id="unlock-popup-title">Course Unlocked!</div><div class="unlock-popup-sub" id="unlock-popup-sub"></div><div class="unlock-popup-progress" id="unlock-popup-progress"></div><button class="unlock-popup-btn" id="unlock-popup-btn">Let's Go! 🚀</button></div></div>

<script>
var COURSES=[],COURSE_DATA={},currentCourse=null,THEMES=[],WORDS=[],currentTheme=-1,idx=0,mode='beginner';
var animW=null,quizW=null,mistakes=0,corrects=0,doneSet={};
var recognition=null,recognitionTimeout=null,mediaRecorder=null,audioChunks=[],audioBlob=null,audioURL=null,audioPlayer=null,isListening=false,recognitionDone=false,micResultTimer=null;
var canvas=null,ctx=null,isDrawing=false,currentPoints=[],canvasStrokes=[],previouslyLockedCourses={};
var currentPage=0, pageSize=12;

function computePageSize(){
  var w=window.innerWidth;
  if(w<=600)return 12;       // 6 cols × 2 rows
  if(w<=1024)return 16;      // 8 cols × 2 rows
  return 22;                 // 11 cols × 2 rows
}

// ============================================
// SPEECH ENGINE
// ============================================
var speechReady=false,speechUnlocked=false,voiceCache=null,speechQueue=[];

function initSpeechEngine(){
    if(!window.speechSynthesis)return;
    var attempts=0,maxAttempts=50;
    function tryLoadVoices(){
        var voices=window.speechSynthesis.getVoices();
        if(voices.length>0){voiceCache=findChineseVoice(voices);speechReady=true;flushSpeechQueue();return;}
        attempts++;if(attempts<maxAttempts)setTimeout(tryLoadVoices,100);
    }
    window.speechSynthesis.onvoiceschanged=function(){
        var voices=window.speechSynthesis.getVoices();
        if(voices.length>0){voiceCache=findChineseVoice(voices);speechReady=true;flushSpeechQueue();}
    };
    tryLoadVoices();
    var unlockSpeech=function(){
        if(speechUnlocked)return;speechUnlocked=true;
        try{
            window.speechSynthesis.cancel();
            var silence=new SpeechSynthesisUtterance('');
            silence.volume=0.01;silence.rate=10;silence.lang='zh-CN';
            if(voiceCache)silence.voice=voiceCache;
            window.speechSynthesis.speak(silence);
        }catch(e){}
        setTimeout(flushSpeechQueue,200);
        document.removeEventListener('touchstart',unlockSpeech);
        document.removeEventListener('touchend',unlockSpeech);
        document.removeEventListener('click',unlockSpeech);
    };
    document.addEventListener('touchstart',unlockSpeech,{passive:true});
    document.addEventListener('touchend',unlockSpeech,{passive:true});
    document.addEventListener('click',unlockSpeech,{passive:true});
}

function findChineseVoice(voices){
    return voices.find(function(v){return v.lang==='zh-CN';})
        ||voices.find(function(v){return v.lang==='zh-TW';})
        ||voices.find(function(v){return v.lang.startsWith('zh');})
        ||null;
}

function flushSpeechQueue(){
    if(!speechReady)return;
    while(speechQueue.length>0){var job=speechQueue.shift();doSpeak(job.text,job.rate,job.btnSelector);}
}

function doSpeak(text,rate,btnSelector){
    if(!window.speechSynthesis)return;
    if(!speechReady){speechQueue.push({text:text,rate:rate,btnSelector:btnSelector});return;}
    window.speechSynthesis.cancel();
    setTimeout(function(){
        try{
            var u=new SpeechSynthesisUtterance(text);
            u.lang='zh-CN';u.rate=rate||0.7;u.volume=1.0;
            if(voiceCache)u.voice=voiceCache;
            var btn=btnSelector?(document.querySelector(btnSelector)||document.getElementById(btnSelector)):null;
            if(btn)btn.classList.add('speaking');
            var watchdog=setTimeout(function(){if(btn)btn.classList.remove('speaking');},Math.max(3000,text.length*800));
            u.onend=function(){clearTimeout(watchdog);if(btn)btn.classList.remove('speaking');};
            u.onerror=function(){clearTimeout(watchdog);if(btn)btn.classList.remove('speaking');};
            window.speechSynthesis.speak(u);
            var resumeInterval=setInterval(function(){
                if(!window.speechSynthesis.speaking){clearInterval(resumeInterval);return;}
                window.speechSynthesis.resume();
            },300);
            setTimeout(function(){clearInterval(resumeInterval);},10000);
        }catch(e){console.warn('Speech error:',e);if(btn)btn.classList.remove('speaking');}
    },50);
}

function speakWord(){var word=getThemeWords()[idx];if(!word)return;doSpeak(word.ch,0.6,'#pinyin-speaker-btn');}
function speakSentence(){var word=getThemeWords()[idx];if(!word)return;doSpeak(word.zh,0.8,'.sentence-card .icon-btn');}

function posKey(){return 'xhz_write_position_'+XHZ.getActiveProfile().id;}
function savePosition(){if(!currentCourse)return;try{localStorage.setItem(posKey(),JSON.stringify({courseId:currentCourse.id,themeIdx:currentTheme,wordIdx:idx}));}catch(e){}}
function restorePosition(){try{var d=JSON.parse(localStorage.getItem(posKey()));return d&&d.courseId?d:null;}catch(e){return null;}}
window.onload=function(){XHZ.requireActive();checkMicSupport();initCanvas();showGuestWarningIfNeeded();loadCourses();initSpeechEngine();onLangChange(function(){updateLeftPanel(idx);});};

function switchTab(t){
  var sStudy=document.getElementById('section-study'),
      sPractice=document.getElementById('section-practice'),
      sSentence=document.getElementById('section-sentence'),
      bw=document.getElementById('m-tab-watch'),
      bwr=document.getElementById('m-tab-write');
  if(t==='watch'){
    sStudy.classList.remove('section-hidden');
    sSentence.classList.remove('section-hidden');
    sPractice.classList.add('section-hidden');
    bw.classList.add('active');bwr.classList.remove('active');
  }else{
    sPractice.classList.remove('section-hidden');
    sStudy.classList.add('section-hidden');
    sSentence.classList.add('section-hidden');
    bwr.classList.add('active');bw.classList.remove('active');
  }
  setTimeout(function(){
    t==='watch'?initAnimWriter(idx):(clearCanvas(),initQuizWriter(idx));
  },100);
}

function getLang(){return getNavLang();}
function getThemeWords(){return !currentCourse||!THEMES.length?[]:WORDS.filter(function(w){return w.theme===THEMES[currentTheme].id;});}
function showGuestWarningIfNeeded(){var wl=localStorage.getItem('xhz_waitlisted')==='true';if(!wl&&XHZ.shouldWarnGuest()){document.getElementById('guest-banner').style.display='flex';XHZ.markGuestWarned();}}
function dismissGuestBanner(){document.getElementById('guest-banner').style.display='none';}
function loadCourses(){setLoadingMsg('Loading courses...');Promise.all([fetch('courses.json').then(function(r){if(!r.ok)throw new Error();return r.json();}),fetch('rewards.json').then(function(r){return r.ok?r.json():null;}).catch(function(){return null;})]).then(function(rs){var cD=rs[0],rD=rs[1];COURSES=cD.courses;if(rD&&rD.effort_items)XHZ.setEffortItems(rD.effort_items);if(!COURSES||COURSES.length===0){showLoadError('No courses found');return;}setLoadingMsg('Loading word data...');preloadAllCourseData(function(){document.getElementById('loading-screen').style.display='none';initLockedCoursesState();var first=getFirstAccessibleCourse();if(!first)first=COURSES[0];buildCourseTabs();selectCourse(first.id);});}).catch(function(e){console.error(e);showLoadError('Could not load courses.json');});}
function preloadAllCourseData(cb){var tl=COURSES.filter(function(c){return !COURSE_DATA[c.id]&&c.data_file;});if(tl.length===0){if(cb)cb();return;}var l=0,t=tl.length;function cd(){l++;setLoadingMsg('Loading word data... ('+l+'/'+t+')');if(l>=t&&cb)cb();}tl.forEach(function(c){fetch(c.data_file).then(function(r){return r.ok?r.json():null;}).then(function(d){if(d)COURSE_DATA[c.id]=d;cd();}).catch(function(){cd();});});setTimeout(function(){if(l<t&&cb)cb();},10000);}
function loadCourseData(id,cb){if(COURSE_DATA[id]){cb(COURSE_DATA[id]);return;}var c=getCourseById(id);if(!c)return;setLoadingMsg('Loading '+id+' words...');document.getElementById('loading-screen').style.display='flex';fetch(c.data_file).then(function(r){if(!r.ok)throw new Error();return r.json();}).then(function(d){COURSE_DATA[id]=d;document.getElementById('loading-screen').style.display='none';cb(d);}).catch(function(e){console.error(e);showLoadError('Could not load '+c.data_file);});}
function setLoadingMsg(m){var el=document.getElementById('loading-msg');if(el)el.textContent=m;}
function showLoadError(h){document.getElementById('loading-screen').innerHTML='<div style="color:#F44336;text-align:center;padding:20px;font-weight:800;">❌ '+h+'</div>';}
function canAccessCourse(id){var c=getCourseById(id);if(!c)return {allowed:false,reason:'Course not found'};if(c.is_free||!c.unlock)return {allowed:true};var s=c.unlock.source,cd=c.unlock.condition,p;if(cd==='seen_100'){p=XHZ.getCourseSeenPercent(s);return {allowed:p>=100,reason:'See all words in '+s+' first',progress:p};}if(cd==='mastered_80'){p=XHZ.getYearMasteredPercent(s);return {allowed:p>=80,reason:'Master 80% of '+s+' words first',progress:p};}return {allowed:false,reason:'Not yet unlocked'};}
function getFirstAccessibleCourse(){for(var i=0;i<COURSES.length;i++)if(canAccessCourse(COURSES[i].id).allowed)return COURSES[i];return null;}
function getCourseById(id){return COURSES.find(function(c){return c.id===id;})||null;}
function initLockedCoursesState(){COURSES.forEach(function(c){previouslyLockedCourses[c.id]=!canAccessCourse(c.id).allowed;});}
function checkForNewUnlocks(){for(var i=0;i<COURSES.length;i++){var c=COURSES[i],wl=previouslyLockedCourses[c.id],ac=canAccessCourse(c.id);if(wl===true&&ac.allowed===true){previouslyLockedCourses[c.id]=false;showUnlockPopup(c);buildCourseTabs();return;}}}
function showUnlockPopup(c){var o=document.getElementById('unlock-popup-overlay');if(!o){alert('🎉 Course Unlocked: '+c.name);return;}var sp=c.unlock?XHZ.getCourseProgress(c.unlock.source):null;document.getElementById('unlock-popup-emoji').textContent='🎊';document.getElementById('unlock-popup-title').textContent='🔓 New Course Unlocked!';document.getElementById('unlock-popup-sub').innerHTML="Congratulations! You've unlocked<br><strong>"+c.name+"</strong>";if(sp&&sp.total>0){document.getElementById('unlock-popup-progress').innerHTML='✅ '+sp.seen+'/'+sp.total+' words seen';}else{document.getElementById('unlock-popup-progress').innerHTML='';}document.getElementById('unlock-popup-btn').onclick=function(){closeUnlockPopup();selectCourse(c.id);};o.classList.add('visible');}
function closeUnlockPopup(){var o=document.getElementById('unlock-popup-overlay');if(o)o.classList.remove('visible');}
var COURSE_EMOJIS={'1A':'📗','1B':'📘','2A':'📕','2B':'📙','3A':'📓','3B':'📔','4A':'📗','4B':'📘','5A':'📕','5B':'📙','6A':'📓','6B':'📔'};
function getCourseEmoji(id){return COURSE_EMOJIS[id]||'📖';}

// ============================================
// PAGINATED WORD LIST
// ============================================
function buildWordList(){
  pageSize=computePageSize();
  currentPage=Math.floor(idx/pageSize);
  renderCurrentPage();
  renderPaginationControls();
}

function renderCurrentPage(){
  var wl=document.getElementById('word-list');
  if(!wl)return;
  wl.innerHTML='';
  var w=getThemeWords();
  var start=currentPage*pageSize;
  var end=Math.min(start+pageSize,w.length);
  for(var i=start;i<end;i++){
    var wd=w[i];
    var b=document.createElement('div');
    var dk=currentCourse.id+'_'+wd.word_id;
    var m=XHZ.getWordMastery(wd.word_id);
    var sc=m?' status-'+m.status:'';
    b.className='word-btn'+(i===idx?' active':'')+(doneSet[dk]?' done':'')+sc;
    b.id='wb-'+i;
    b.innerHTML=wd.ch+'<span class="wp">'+wd.py+'</span>';
    b.onclick=(function(ix){return function(){loadChar(ix);};})(i);
    wl.appendChild(b);
  }
}

function renderPaginationControls(){
  var w=getThemeWords();
  var totalPages=Math.max(1,Math.ceil(w.length/pageSize));
  var posEl=document.getElementById('picker-pos');
  var dotsEl=document.getElementById('page-dots');
  var prevBtn=document.getElementById('page-prev-btn');
  var nextBtn=document.getElementById('page-next-btn');

  if(posEl)posEl.textContent=(idx+1)+'/'+w.length;

  if(totalPages<=1){
    if(prevBtn)prevBtn.style.display='none';
    if(nextBtn)nextBtn.style.display='none';
    if(dotsEl)dotsEl.style.display='none';
  }else{
    if(prevBtn){prevBtn.style.display='';prevBtn.disabled=(currentPage===0);}
    if(nextBtn){nextBtn.style.display='';nextBtn.disabled=(currentPage>=totalPages-1);}
    if(dotsEl){
      dotsEl.style.display='flex';
      dotsEl.innerHTML='';
      for(var p=0;p<totalPages;p++){
        var d=document.createElement('div');
        d.className='page-dot'+(p===currentPage?' active':'');
        d.onclick=(function(pg){return function(){goToPage(pg);};})(p);
        dotsEl.appendChild(d);
      }
    }
  }
}

function changePage(delta){
  var w=getThemeWords();
  var totalPages=Math.max(1,Math.ceil(w.length/pageSize));
  var newPage=currentPage+delta;
  if(newPage<0||newPage>=totalPages)return;
  goToPage(newPage);
}

function goToPage(p){
  currentPage=p;
  renderCurrentPage();
  renderPaginationControls();
}

function loadChar(i){
  idx=i;
  savePosition();
  var newPage=Math.floor(i/pageSize);
  if(newPage!==currentPage){
    currentPage=newPage;
    renderCurrentPage();
  }
  renderPaginationControls();
  stopListening();clearRecording();resetMicResult();clearCanvas();
  if(quizW){try{quizW.cancelQuiz();}catch(e){}quizW=null;}
  if(animW){try{animW.cancelAnimation();}catch(e){}animW=null;}
  var ab=document.getElementById('anim-box'),qb=document.getElementById('quiz-box');
  if(ab)ab.innerHTML='';if(qb)qb.innerHTML='';

  var wd=wds[i];if(!wd)return;
  var r=XHZ.markSeen(wd.word_id);
  if(r&&r.statusChanged){refreshWordButton(i);updateCourseTabsProgress();checkForNewUnlocks();}
  updateLeftPanel(i);
  setTimeout(function(){
    if(idx!==i)return;
    var studyHidden=document.getElementById('section-study').classList.contains('section-hidden'),
        practiceHidden=document.getElementById('section-practice').classList.contains('section-hidden');
    if(window.innerWidth>600){initAnimWriter(i);initQuizWriter(i);}
    else{if(!studyHidden)initAnimWriter(i);if(!practiceHidden)initQuizWriter(i);}
  },50);
}

var TONE_LABELS={0:{symbol:'·',cls:'tone-0'},1:{symbol:'—',cls:'tone-1'},2:{symbol:'↗',cls:'tone-2'},3:{symbol:'↙↗',cls:'tone-3'},4:{symbol:'↘',cls:'tone-4'}};

function stripTones(py){return py.replace(/[āáǎà]/g,'a').replace(/[ēéěè]/g,'e').replace(/[īíǐì]/g,'i').replace(/[ōóǒò]/g,'o').replace(/[ūúǔù]/g,'u').replace(/[ǖǘǚǜ]/g,'v').toLowerCase().trim();}

function levenshteinDistance(s1,s2){var l1=s1.length,l2=s2.length,m=[];for(var i=0;i<=l1;i++)m[i]=[i];for(var j=0;j<=l2;j++)m[0][j]=j;for(var i=1;i<=l1;i++)for(var j=1;j<=l2;j++){var c=s1[i-1]===s2[j-1]?0:1;m[i][j]=Math.min(m[i-1][j]+1,m[i][j-1]+1,m[i-1][j-1]+c);}return m[l1][l2];}

function initCanvas(){canvas=document.getElementById('handwriting-canvas');ctx=canvas.getContext('2d');resizeCanvas();window.addEventListener('resize',resizeCanvas);var w=document.getElementById('quiz-wrapper');w.addEventListener('mousedown',onDrawStart);w.addEventListener('mousemove',onDrawMove);w.addEventListener('mouseup',onDrawEnd);w.addEventListener('mouseleave',onDrawEnd);w.addEventListener('touchstart',onTouchStart,{passive:true});w.addEventListener('touchmove',onTouchMove,{passive:true});w.addEventListener('touchend',onTouchEnd,{passive:true});}

    clearRecording();recognitionDone=false;isListening=true;
    if(recognitionTimeout){clearTimeout(recognitionTimeout);recognitionTimeout=null;}
    var micBtn=document.getElementById('mic-btn');
    if(micBtn){micBtn.classList.add('recording');micBtn.textContent='⏹';}
    setMicResult('🎤 Listening... say the character!','listening');
    startRecognition();
    setTimeout(function(){
        if(!isListening)return;
        navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
            if(!isListening){stream.getTracks().forEach(function(t){t.stop();});return;}
            window._micStream=stream;
            var mimeType=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':MediaRecorder.isTypeSupported('audio/mp4')?'audio/mp4':'';
            try{mediaRecorder=new MediaRecorder(stream,mimeType?{mimeType:mimeType}:{});}catch(e){console.warn('MediaRecorder error:',e);return;}
            audioChunks=[];
            mediaRecorder.ondataavailable=function(e){if(e.data&&e.data.size>0)audioChunks.push(e.data);};
            mediaRecorder.onstop=function(){
                if(audioChunks.length>0){
                    audioBlob=new Blob(audioChunks,{type:mimeType||'audio/webm'});
                    audioURL=URL.createObjectURL(audioBlob);
                    audioPlayer=new Audio(audioURL);
                    audioPlayer.onended=function(){var rb=document.getElementById('replay-btn');if(rb)rb.classList.remove('playing');};
                    var rb=document.getElementById('replay-btn');if(rb)rb.classList.add('visible');
                }
                if(window._micStream)window._micStream.getTracks().forEach(function(t){t.stop();});
            };
            mediaRecorder.start();
        }).catch(function(err){console.warn('MediaRecorder setup failed:',err.message);});
    },150);
}

function startRecognition(){
    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return;
    recognition=new SR();recognition.lang='zh-CN';recognition.continuous=false;
    recognition.interimResults=true;recognition.maxAlternatives=10;
    var hasProcessedFinal=false,speechDetected=false;
    recognition.onspeechstart=function(){speechDetected=true;if(recognitionTimeout){clearTimeout(recognitionTimeout);recognitionTimeout=null;}setMicResult('🎤 Hearing you...','listening');};
    recognition.onresult=function(event){
        var word=getThemeWords()[idx];if(!word)return;
        speechDetected=true;if(recognitionTimeout){clearTimeout(recognitionTimeout);recognitionTimeout=null;}
        var finalResults=[],interimText='';
        for(var i=event.resultIndex;i<event.results.length;i++){
            var result=event.results[i];
            if(result.isFinal){for(var j=0;j<result.length;j++)finalResults.push({transcript:result[j].transcript,confidence:result[j].confidence});}
            else interimText+=result[0].transcript;
        }
        if(interimText&&!hasProcessedFinal)setMicResult('🎤 Hearing: "'+interimText+'"...','listening');
        if(finalResults.length>0&&!hasProcessedFinal){
            hasProcessedFinal=true;recognitionDone=true;
            var gradeResult=gradeRecognitionResult(finalResults,word.ch,word.py);
            showMicGrade(gradeResult.grade,gradeResult.heard,word.ch);stopListening();
        }
    };
    recognition.onend=function(){
        if(recognitionTimeout){clearTimeout(recognitionTimeout);recognitionTimeout=null;}
        setTimeout(function(){
            if(!recognitionDone&&isListening){setMicResult(speechDetected?"🤔 Couldn't understand. Tap 🎤 and try again!":"🤔 No speech heard. Tap 🎤 and speak!",'wrong');scheduleMicReset(6000);}
            stopListening();
        },200);
    };
    recognition.onnomatch=function(){if(!recognitionDone){setMicResult("🤔 No match found. Try speaking more clearly!",'wrong');scheduleMicReset(6000);}stopListening();};
    recognition.onerror=function(e){
        if(recognitionTimeout){clearTimeout(recognitionTimeout);recognitionTimeout=null;}
        if(recognitionDone)return;
        var msg;
        switch(e.error){
            case 'not-allowed':msg='🚫 Microphone access denied.';break;
            case 'no-speech':msg='🤔 No speech detected. Tap 🎤 and speak!';break;
            case 'network':msg='⚠️ Network error. Speech recognition needs internet.';break;
            case 'audio-capture':msg='🎤 No microphone found.';break;
            case 'aborted':stopListening();return;
            default:msg='⚠️ Error: '+e.error;
        }
        setMicResult(msg,'wrong');scheduleMicReset(6000);stopListening();
    };
    recognition.onspeechend=function(){setTimeout(function(){if(recognition&&!recognitionDone){try{recognition.stop();}catch(e){}}},1500);};
    try{
        recognition.start();
        recognitionTimeout=setTimeout(function(){if(isListening&&!recognitionDone&&!speechDetected){setMicResult('⏱️ No speech detected. Tap 🎤 to try again.','wrong');scheduleMicReset(5000);stopListening();}},8000);
    }catch(e){setMicResult('⚠️ Could not start microphone: '+e.message,'wrong');stopListening();}
}

function stopListening(){
    if(recognitionTimeout){clearTimeout(recognitionTimeout);recognitionTimeout=null;}
    if(recognition){try{recognition.stop();}catch(e){}recognition=null;}
    if(mediaRecorder&&mediaRecorder.state!=='inactive'){try{mediaRecorder.stop();}catch(e){}}
    isListening=false;
    var micBtn=document.getElementById('mic-btn');
    if(micBtn){micBtn.classList.remove('recording');micBtn.textContent='🎤';}
}

function playbackRecording(){
    if(!audioPlayer)return;
    var rb=document.getElementById('replay-btn');
    audioPlayer.pause();audioPlayer.currentTime=0;rb.classList.add('playing');
    audioPlayer.play().catch(function(){rb.classList.remove('playing');setMicResult('⚠️ Could not play recording.','wrong');});
}

function showMicGrade(grade,heard,target){
    var word=getThemeWords()[idx];if(!word)return;
    var pinyin=word.py,meaning=getLang()==='th'?word.th:word.en;
    switch(grade){
        case 3:
            setMicResult('🎉 Perfect! "'+target+'" ('+pinyin+') = '+meaning,'correct');
            var py=document.getElementById('char-pinyin');
            if(py){py.classList.remove('pop');void py.offsetWidth;py.classList.add('pop');}
            setTimeout(speakWord,400);
            var micResult=XHZ.addScore('study',1,[word.word_id]);
            if(micResult&&micResult.newItemUnlocked){setTimeout(function(){showItemPopup(micResult.newItemUnlocked);},1000);}
            break;
        case 2:
            setMicResult('👍 Close! I heard "'+heard+'" - try matching the tone of "'+target+'"','correct');
            setTimeout(speakWord,600);break;
        case 1:setMicResult('❌ I heard "'+heard+'" — say "'+target+'" ('+pinyin+')','wrong');break;
        default:setMicResult('🤔 No speech heard. Tap 🎤 and say "'+target+'" ('+pinyin+')','wrong');
    }
    scheduleMicReset(8000);
}

document.addEventListener('DOMContentLoaded',function(){initNav('write');refreshStrings();});
var resizeTimer;window.addEventListener('resize',function(){
  resizeCanvas();
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(function(){
    // If leaving mobile width, clear any section-hidden classes so all sections show
    if(window.innerWidth>600){
      document.getElementById('section-study').classList.remove('section-hidden');
      document.getElementById('section-practice').classList.remove('section-hidden');
      document.getElementById('section-sentence').classList.remove('section-hidden');
    }
    // Recompute page size if breakpoint changed
    var newPageSize=computePageSize();
    if(newPageSize!==pageSize){
      pageSize=newPageSize;
      currentPage=Math.floor(idx/pageSize);
      renderCurrentPage();
      renderPaginationControls();
    }
    var studyHidden=document.getElementById('section-study').classList.contains('section-hidden'),
        practiceHidden=document.getElementById('section-practice').classList.contains('section-hidden');
    if(window.innerWidth>768){initAnimWriter(idx);initQuizWriter(idx);}
    else{if(!studyHidden)initAnimWriter(idx);if(!practiceHidden)initQuizWriter(idx);}
  },50);
});
</script>
