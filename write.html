<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>学汉字 Learn Chinese</title>
<script src="nav.js"></script>
<script src="profiles.js"></script>
<script src="strings.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<style>
:root {
    --theme-color: #FFB347;
    --theme-color-light: #FFE0B255;
    --theme-color-pale: #FFB34718;
    --paper-bg: #fdfaf0;
    --paper-texture: url('https://www.transparenttextures.com/patterns/rice-paper.png');
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: var(--theme-color-pale);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: background 0.4s;
}
.loading-screen {
    position: fixed; inset: 0;
    background: #FFF9F0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 999; gap: 16px;
    font-size: 1em; color: #aaa;
}
.loading-spinner {
    width: 40px; height: 40px;
    border: 4px solid #FFD9A0;
    border-top-color: #FFB347;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.mobile-tabs {
    display: none;
    background: white;
    padding: 8px 12px;
    gap: 8px;
    border-bottom: 2px solid var(--theme-color-light);
    z-index: 10;
}
.m-tab-btn {
    flex: 1;
    padding: 10px;
    border-radius: 12px;
    border: 2px solid #eee;
    font-weight: bold;
    font-size: 0.85em;
    background: #f9f9f9;
    cursor: pointer;
}
.m-tab-btn.active { background: var(--theme-color); color: white; border-color: var(--theme-color); }
.main-content {
    display: flex;
    flex: 1;
    padding: 6px;
    gap: 8px;
    overflow: hidden;
    min-height: 0;
}
.panel {
    background: var(--paper-bg);
    background-image: var(--paper-texture);
    border: 2px solid #e0d5b7;
    border-radius: 14px;
    padding: 12px;
    box-shadow: inset 0 0 40px rgba(0,0,0,0.03), 0 4px 15px rgba(0,0,0,0.05);
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    overflow: auto;
    min-width: 0;
    position: relative;
}
.panel-title {
    font-size: 0.75em; color: #8d7a5d;
    font-weight: bold; text-transform: uppercase;
    letter-spacing: 1.5px; margin-bottom: 8px;
    flex-shrink: 0;
}
.left-panel { border-left: 6px solid var(--theme-color); }
.char-box-wrapper {
    position: relative;
    width: min(180px, 40vmin);
    height: min(180px, 40vmin);
    flex-shrink: 0;
    margin-bottom: 8px;
}
.char-box {
    width: 100%; height: 100%;
    border-radius: 12px;
    background: white;
    border: 3px solid #eee;
}
#anim-box { border-color: var(--theme-color-light); }
#quiz-box { border: 3px solid #B8E8D8; }
.crosshair {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    border-radius: 12px; overflow: hidden;
    z-index: 1;
}
.crosshair::before, .crosshair::after {
    content: ''; position: absolute;
    background: rgba(180,180,180,0.5);
}
.crosshair::before { top: 50%; left: 0; width: 100%; height: 1px; }
.crosshair::after { left: 50%; top: 0; width: 1px; height: 100%; }
#handwriting-canvas {
    position: absolute;
    top: 3px; left: 3px;
    width: calc(100% - 6px);
    height: calc(100% - 6px);
    border-radius: 9px;
    pointer-events: none;
    z-index: 2;
}
.pinyin-row {
    display: flex; align-items: center;
    justify-content: center; gap: 8px;
    margin-bottom: 6px; flex-shrink: 0;
}
.pinyin-text { font-size: clamp(1.2em, 2.5vmin, 1em); color: var(--theme-color); font-weight: bold; }
.tone-badge {
    display: inline-flex;
    align-items: center; justify-content: center;
    width: 20px; height: 20px;
    border-radius: 50%;
    font-size: 0.62em; font-weight: bold;
    flex-shrink: 0;
    transition: background 0.3s, color 0.3s;
}
.tone-1 { background: #E3F2FD; color: #1565C0; }
.tone-2 { background: #E8F5E9; color: #2E7D32; }
.tone-3 { background: #FFF8E1; color: #F57F17; }
.tone-4 { background: #FCE4EC; color: #C62828; }
.tone-0 { background: #F5F5F5; color: #9E9E9E; }
.icon-btn {
    background: var(--theme-color-light);
    border: none; border-radius: 50%;
    width: 32px; height: 32px;
    font-size: 1em; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.15s;
    flex-shrink: 0;
}
.icon-btn:active { transform: scale(0.9); }
.icon-btn.speaking { background: var(--theme-color); animation: pulse 0.6s infinite alternate; }
.icon-btn.recording { background: #FF6B6B; animation: pulse 0.6s infinite alternate; }
@keyframes pulse {
    from { transform: scale(1); box-shadow: 0 0 0 rgba(255,100,66,0.4); }
    to { transform: scale(1.15); box-shadow: 0 0 6px rgba(255,100,66,0.7); }
}
.meaning-text {
    font-size: clamp(1.2em, 5vmin, 2em);
    color: #555; margin-bottom: 6px;
    text-align: center; flex-shrink: 0;
    font-weight: 600; line-height: 1.2;
}
.mic-result {
    width: 100%;
    background: #F0FFF4; border-radius: 8px;
    padding: 3px 6px;
    font-size: clamp(0.62em, 1.8vmin, 0.74em);
    color: #555; text-align: center;
    border: 2px solid transparent;
    transition: all 0.3s;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 2px; min-height: 26px;
}
.mic-result.correct { background:#E8F5E9; border-color:#66BB6A; color:#2E7D32; font-weight:bold; }
.mic-result.wrong { background:#FFF0F0; border-color:#FF6B6B; color:#C62828; font-weight:bold; }
.mic-result.listening { background:#FFF3E0; border-color:var(--theme-color); color:#E65100; }
.replay-row { display: flex; align-items: center; justify-content: center; flex-shrink: 0; min-height: 20px; margin-top: 2px; }
.replay-btn {
    background: #B2EBF2; border: none;
    border-radius: 12px; padding: 2px 8px;
    font-size: 0.68em; font-weight: bold; color: #00838F;
    cursor: pointer; display: none;
    align-items: center; gap: 3px; transition: background 0.2s;
}
.replay-btn.visible { display: flex; }
.replay-btn.playing { background: #80DEEA; animation: pulse 0.6s infinite alternate; }
.sentence-block { background: #FFF5E6; border-radius: 8px; padding: 4px 6px; width: 100%; margin-top: 2px; flex-shrink: 0; }
.sentence-zh-row { display: flex; align-items: center; gap: 4px; margin-bottom: 1px; }
.sentence-zh { font-size: clamp(0.7em, 2vmin, 0.84em); color: #333; font-weight: bold; }
.sentence-tr { font-size: clamp(0.62em, 1.7vmin, 0.72em); color: #888; }
.right-panel { background: linear-gradient(135deg,#F0FFF8,#F5FAFF); }
.right-header { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 4px; flex-shrink: 0; }
.mode-toggle { display: flex; gap: 4px; }
.mode-btn {
    padding: 3px 7px; border: 2px solid #98D8C8;
    background: transparent; color: #98D8C8;
    border-radius: 10px; font-size: 0.65em;
    font-weight: bold; cursor: pointer; transition: all 0.2s;
}
.mode-btn.active { background: #98D8C8; color: white; }
.score-area { margin-top: 4px; text-align: center; width: 100%; flex-shrink: 0; }
.stars-display { font-size: clamp(1.1em, 3.5vmin, 1.5em); min-height: 1.4em; }
.score-label { font-size: 0.6em; color: #bbb; font-weight: bold; letter-spacing: 1px; }
.score-msg { font-size: clamp(0.65em, 1.8vmin, 0.78em); font-weight: bold; color: #66BB6A; min-height: 1em; margin-top: 1px; }
.stats-row { display: flex; justify-content: center; gap: 10px; margin-top: 3px; }
.stat-item { text-align: center; }
.stat-val { font-size: clamp(0.85em, 2.5vmin, 1em); font-weight: bold; color: var(--theme-color); }
.stat-lbl { font-size: 0.55em; color: #bbb; }
.word-list-section { background: white; border-top: 2px solid var(--theme-color-light); flex-shrink: 0; transition: border-color 0.4s; max-height: 180px; overflow-y: auto; }
.course-tabs, .set-tabs { display: flex; flex-wrap: wrap; gap: 3px; padding: 4px 6px 0; }
.course-tabs { border-bottom: 1px solid #f0f0f0; }
.course-tab, .set-tab {
    flex-shrink: 0; padding: 3px 10px;
    border: 2px solid #eee;
    background: #f9f9f9; border-radius: 7px 7px 0 0;
    font-size: 0.65em; font-weight: bold; color: #aaa;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
    position: relative;
}
.set-tab { padding: 3px 9px; border-bottom: none; }
.course-tab.active, .set-tab.active { background: white; color: #333; border-color: var(--theme-color-light); border-bottom-color: white; }
.course-tab.locked { color: #ccc; cursor: not-allowed; }
.course-tab.locked::after { content: '🔒'; font-size: 0.75em; margin-left: 3px; }
.word-list { display: flex; flex-wrap: wrap; gap: 5px; padding: 4px 6px 6px; }
.word-btn {
    flex-shrink: 0;
    width: clamp(60px, 11vw, 54px);
    height: clamp(70px, 13vw, 60px);
    border: 2px solid var(--theme-color-light);
    background: var(--theme-color-pale);
    border-radius: 10px; display: flex;
    flex-direction: column; align-items: center;
    justify-content: center; cursor: pointer;
    font-size: clamp(1.4em, 4vw, 1.3em); color: #333;
    position: relative; transition: all 0.2s;
}
.word-btn .wp { font-size: 0.26em; color: var(--theme-color); margin-top: 1px; }
.word-btn.active { background: var(--theme-color-light); border-color: var(--theme-color); transform: scale(1.07); box-shadow: 0 3px 8px rgba(0,0,0,0.15); }
.word-btn::before { content: ''; position: absolute; bottom: 3px; left: 3px; width: 6px; height: 6px; border-radius: 50%; background: transparent; }
.word-btn.status-seen::before { background: #90CAF9; }
.word-btn.status-practiced::before { background: #FFB347; }
.word-btn.status-mastered::before { background: #66BB6A; }
.word-btn.done::after { content: '✓'; position: absolute; top: -4px; right: -4px; background: #66BB6A; color: white; border-radius: 50%; width: 13px; height: 13px; font-size: 0.34em; line-height: 13px; text-align: center; }
.guest-banner { background: #FFF3E0; border-top: 2px solid #FFB347; padding: 6px 12px; display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 0.72em; color: #E65100; flex-shrink: 0; }
.guest-banner button { background: #FFB347; color: white; border: none; border-radius: 8px; padding: 3px 10px; font-size: 0.9em; cursor: pointer; white-space: nowrap; }
.guest-banner .dismiss { background: transparent; color: #aaa; font-size: 1.1em; padding: 0 4px; }
.badge-popup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.badge-popup-overlay.visible { opacity: 1; pointer-events: all; }
.badge-popup { background: white; border-radius: 20px; padding: 28px 24px; text-align: center; max-width: 280px; width: 90%; box-shadow: 0 10px 40px rgba(0,0,0,0.2); transform: scale(0.8); transition: transform 0.3s; }
.badge-popup-overlay.visible .badge-popup { transform: scale(1); }
.badge-popup-emoji { font-size: 3.5em; margin-bottom: 8px; }
.badge-popup-title { font-size: 1.1em; font-weight: bold; color: #333; margin-bottom: 4px; }
.badge-popup-sub { font-size: 0.8em; color: #888; margin-bottom: 16px; }
.badge-popup-btn { background: var(--theme-color); color: white; border: none; border-radius: 12px; padding: 8px 20px; font-size: 0.9em; font-weight: bold; cursor: pointer; transition: transform 0.15s; }
.badge-popup-btn:active { transform: scale(0.95); }
.unlock-popup-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 1001;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
}
.unlock-popup-overlay.visible { opacity: 1; pointer-events: all; }
.unlock-popup {
    background: linear-gradient(135deg, #FFF9E6, #FFFFFF);
    border-radius: 24px;
    padding: 32px 28px;
    text-align: center;
    max-width: 320px; width: 90%;
    box-shadow: 0 15px 50px rgba(0,0,0,0.25);
    transform: scale(0.8);
    transition: transform 0.3s;
    border: 3px solid #FFD700;
}
.unlock-popup-overlay.visible .unlock-popup { transform: scale(1); }
.unlock-popup-emoji { font-size: 4em; margin-bottom: 12px; animation: bounce 0.6s ease infinite alternate; }
@keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
.unlock-popup-title { font-size: 1.3em; font-weight: bold; color: #333; margin-bottom: 8px; }
.unlock-popup-sub { font-size: 0.9em; color: #666; margin-bottom: 12px; line-height: 1.4; }
.unlock-popup-progress { font-size: 0.8em; color: #888; margin-bottom: 16px; padding: 8px; background: #f5f5f5; border-radius: 8px; }
.unlock-popup-btn {
    background: linear-gradient(135deg, #FFD700, #FFA500);
    color: white; border: none; border-radius: 14px;
    padding: 12px 28px; font-size: 1em;
    font-weight: bold; cursor: pointer;
    transition: transform 0.15s;
    box-shadow: 0 4px 15px rgba(255,165,0,0.4);
}
.unlock-popup-btn:active { transform: scale(0.95); }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
.shake { animation: shake 0.3s ease; }
@keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
.pop { animation: pop 0.35s ease; }
.no-mic-msg { font-size: 0.62em; color: #ccc; text-align: center; margin-top: 2px; flex-shrink: 0; }
@media (max-width: 600px) {
    .mobile-tabs { display: flex; }
    .main-content { flex-direction: column; }
    .left-panel.mobile-hidden, .right-panel.mobile-hidden { display: none; }
    .char-box-wrapper { width: min(260px, 70vw); height: min(260px, 70vw); }
}
</style>
</head>
<body>
<div class="loading-screen" id="loading-screen">
    <div class="loading-spinner"></div>
    <span id="loading-msg">Loading...</span>
</div>
<div id="app-nav"></div>
<div class="mobile-tabs" id="mobile-tabs">
    <button class="m-tab-btn active" id="m-tab-watch" onclick="switchTab('watch')">👁️ WATCH</button>
    <button class="m-tab-btn" id="m-tab-write" onclick="switchTab('write')">✍️ PRACTICE</button>
</div>
<div class="guest-banner" id="guest-banner" style="display:none;">
    <span>Progress is saved on this device for now. Cloud saving is coming soon! Sign up for free and we will tell you when it's available.</span>
    <button class="banner-btn" data-i18n="save_my_progress" onclick="window.location.href='signup.html'"></button>
    <button class="dismiss" onclick="dismissGuestBanner()">✕</button>
</div>
<div class="main-content">
    <div class="panel left-panel" id="panel-watch">
        <div class="panel-title">✏️ Watch &amp; Learn</div>
        <div class="char-box-wrapper">
            <div id="anim-box" class="char-box"></div>
            <div class="crosshair"></div>
        </div>
        <div class="pinyin-row">
            <span id="char-pinyin" class="pinyin-text"></span>
            <span id="tone-badge" class="tone-badge tone-0"></span>
            <button class="icon-btn" id="pinyin-speaker-btn" onclick="speakWord()">🔊</button>
            <button class="icon-btn" id="mic-btn" onclick="toggleListening()">🎤</button>
        </div>
        <div id="char-meaning" class="meaning-text"></div>
        <div class="mic-result" id="mic-result">Tap 🎤 and speak!</div>
        <div class="replay-row">
            <button class="replay-btn" id="replay-btn" onclick="playbackRecording()">🔁 Hear yourself</button>
        </div>
        <div class="sentence-block" style="background:#f9f3e6; padding:10px; border-radius:10px; width:100%;">
            <div class="sentence-zh-row" style="display:flex; align-items:center; gap:10px;">
                <button class="icon-btn" style="width:35px; height:35px; font-size:0.9em;" onclick="speakSentence()">🔊</button>
                <span id="sent-zh" style="font-weight:bold; font-size:1.1em;"></span>
            </div>
            <div id="sent-tr" class="sentence-tr" style="color:#888; font-size:0.9em; margin-top:4px;"></div>
        </div>
        <div class="no-mic-msg" id="no-mic-msg" style="display:none;">🎤 Not supported in this browser.</div>
    </div>
    <div class="panel right-panel mobile-hidden" id="panel-write">
        <div class="right-header" style="width:100%; display:flex; justify-content:space-between; align-items:center;">
            <div class="panel-title">✍️ Practice</div>
            <div class="mode-toggle" style="display:flex; gap:5px;">
                <button class="mode-btn active" id="btn-beginner" onclick="setMode('beginner')" style="padding:4px 8px; font-size:0.7em; border-radius:8px;">🌟 Beginner</button>
                <button class="mode-btn" id="btn-challenge" onclick="setMode('challenge')" style="padding:4px 8px; font-size:0.7em; border-radius:8px;">🔥 Challenge</button>
            </div>
        </div>
        <div class="char-box-wrapper" id="quiz-wrapper">
            <div id="quiz-box" class="char-box"></div>
            <div class="crosshair"></div>
            <canvas id="handwriting-canvas"></canvas>
        </div>
        <div class="score-area">
            <div class="stars-display" id="stars-display" style="font-size:1.8em;">⭐⭐⭐</div>
            <div class="score-label">SCORE</div>
            <div class="score-msg" id="score-msg" style="font-weight:bold; height:1.2em;" data-i18n="trace_prompt"></div>
            <div class="stats-row" style="display:flex; gap:20px; justify-content:center; margin-top:10px;">
                <div class="stat-item"><div class="stat-val" id="s-correct">0</div><div class="stat-lbl">Correct</div></div>
                <div class="stat-item"><div class="stat-val" id="s-mistakes">0</div><div class="stat-lbl">Mistakes</div></div>
                <div class="stat-item"><div class="stat-val" id="s-stars">0</div><div class="stat-lbl">Today ⭐</div></div>
            </div>
        </div>
    </div>
</div>
<div class="word-list-section">
    <div class="course-tabs" id="course-tabs"></div>
    <div class="set-tabs" id="set-tabs"></div>
    <div class="word-list" id="word-list"></div>
</div>
<div class="badge-popup-overlay" id="badge-popup-overlay">
    <div class="badge-popup">
        <div class="badge-popup-emoji" id="badge-popup-emoji">🏅</div>
        <div class="badge-popup-title" id="badge-popup-title">New Badge!</div>
        <div class="badge-popup-sub" id="badge-popup-sub"></div>
        <button class="badge-popup-btn" onclick="closeBadgePopup()">Keep going! 🐼</button>
    </div>
</div>
<div class="unlock-popup-overlay" id="unlock-popup-overlay">
    <div class="unlock-popup">
        <div class="unlock-popup-emoji" id="unlock-popup-emoji">🎊</div>
        <div class="unlock-popup-title" id="unlock-popup-title">Course Unlocked!</div>
        <div class="unlock-popup-sub" id="unlock-popup-sub"></div>
        <div class="unlock-popup-progress" id="unlock-popup-progress"></div>
        <button class="unlock-popup-btn" id="unlock-popup-btn">Let's Go! 🚀</button>
    </div>
</div>
<script>
var COURSES=[], COURSE_DATA={}, currentCourse=null, THEMES=[], WORDS=[], currentTheme=0, idx=0, mode='beginner';
var animW=null, quizW=null, mistakes=0, corrects=0, doneSet={};
var recognition=null, recognitionTimeout=null, mediaRecorder=null, audioChunks=[], audioBlob=null, audioURL=null, audioPlayer=null, isListening=false, recognitionDone=false, micResultTimer=null;
var canvas=null, ctx=null, isDrawing=false, currentPoints=[], canvasStrokes=[];
var voicesReady=false, pendingSpeak=null;
var previouslyLockedCourses={};

window.onload = function() {
    XHZ.requireActive();
    checkMicSupport();
    initCanvas();
    showGuestWarningIfNeeded();
    loadCourses();
    initVoices();
    var unlockAudio = function() {
        if (window.speechSynthesis) {
            var u = new SpeechSynthesisUtterance(' ');
            u.volume = 0.01; u.rate = 10;
            window.speechSynthesis.speak(u);
        }
        document.body.removeEventListener('touchstart', unlockAudio);
        document.body.removeEventListener('click', unlockAudio);
    };
    document.body.addEventListener('touchstart', unlockAudio, { passive: true });
    document.body.addEventListener('click', unlockAudio, { passive: true });
    onLangChange(function() { updateLeftPanel(idx); });
};

function initVoices() {
    if (!window.speechSynthesis) return;
    var loadVoices = function() {
        var voices = window.speechSynthesis.getVoices();
        if (voices.length > 0) {
            voicesReady = true;
            if (pendingSpeak) { var fn = pendingSpeak; pendingSpeak = null; fn(); }
        }
    };
    loadVoices();
    window.speechSynthesis.onvoiceschanged = loadVoices;
    setTimeout(loadVoices, 100);
    setTimeout(loadVoices, 500);
}

function switchTab(target) {
    var pWatch=document.getElementById('panel-watch'), pWrite=document.getElementById('panel-write');
    var bWatch=document.getElementById('m-tab-watch'), bWrite=document.getElementById('m-tab-write');
    if (target === 'watch') {
        pWatch.classList.remove('mobile-hidden'); pWrite.classList.add('mobile-hidden');
        bWatch.classList.add('active'); bWrite.classList.remove('active');
    } else {
        pWrite.classList.remove('mobile-hidden'); pWatch.classList.add('mobile-hidden');
        bWrite.classList.add('active'); bWatch.classList.remove('active');
    }

function loadCourses() {
    setLoadingMsg('Loading courses...');
    Promise.all([
        fetch('courses.json').then(function(r) { if (!r.ok) throw new Error(); return r.json(); }),
        fetch('rewards.json').then(function(r) { return r.ok ? r.json() : null; }).catch(function(){ return null; })
    ])
    .then(function(results) {
        var courseData  = results[0];
        var rewardsData = results[1];
        COURSES = courseData.courses;

        // Register effort items so addScore() can fire item unlocks
        if (rewardsData && rewardsData.effort_items) {
            XHZ.setEffortItems(rewardsData.effort_items);
        }

        if (!COURSES || COURSES.length === 0) {
            showLoadError('No courses found in courses.json');
            return;
        }
        setLoadingMsg('Loading word data...');
        preloadAllCourseData(function() {
            document.getElementById('loading-screen').style.display = 'none';
            initLockedCoursesState();
            var first = getFirstAccessibleCourse();
            if (!first) first = COURSES[0];
            buildCourseTabs();
            selectCourse(first.id);
        });
    }).catch(function(e) {
        console.error('Failed to load courses:', e);
        showLoadError('Could not load courses.json<br><small>Make sure courses.json is in the same folder.</small>');
    });
}

function preloadAllCourseData(callback) {
    var toLoad = COURSES.filter(function(c) { return !COURSE_DATA[c.id] && c.data_file; });
    if (toLoad.length === 0) { if (callback) callback(); return; }
    var loaded = 0;
    var total = toLoad.length;
    function checkDone() {
        loaded++;
        setLoadingMsg('Loading word data... (' + loaded + '/' + total + ')');
        if (loaded >= total && callback) callback();
    }
    toLoad.forEach(function(course) {
        fetch(course.data_file)
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(data) {
                if (data) COURSE_DATA[course.id] = data;
                checkDone();
            })
            .catch(function() { checkDone(); });
    });
    setTimeout(function() {
        if (loaded < total && callback) callback();
    }, 10000);
}

function loadCourseData(courseId, callback) {
    if (COURSE_DATA[courseId]) { callback(COURSE_DATA[courseId]); return; }
    var course = getCourseById(courseId);
    if (!course) return;
    setLoadingMsg('Loading ' + courseId + ' words...');
    document.getElementById('loading-screen').style.display = 'flex';
    fetch(course.data_file).then(function(r) { if (!r.ok) throw new Error(); return r.json(); })
    .then(function(data) {
        COURSE_DATA[courseId] = data;
        document.getElementById('loading-screen').style.display = 'none';
        callback(data);
    }).catch(function(e) { 
        console.error('Failed to load course data:', e);
        showLoadError('Could not load ' + course.data_file); 
    });
}

function canAccessCourse(courseId) {
    var course = getCourseById(courseId);
    if (!course) return { allowed: false, reason: 'Course not found' };
    if (course.is_free || !course.unlock) return { allowed: true };
    var source = course.unlock.source, condition = course.unlock.condition, pct;
    if (condition === 'seen_100') { 
        pct = XHZ.getCourseSeenPercent(source); 
        return { allowed: pct >= 100, reason: 'See all words in ' + source + ' first', progress: pct }; 
    }
    if (condition === 'mastered_80') { 
        pct = XHZ.getYearMasteredPercent(source); 
        return { allowed: pct >= 80, reason: 'Master 80% of ' + source + ' words first', progress: pct }; 
    }
    return { allowed: false, reason: 'Not yet unlocked' };
}

function checkForNewUnlocks() {
    for (var i = 0; i < COURSES.length; i++) {
        var course = COURSES[i];
        var wasLocked = previouslyLockedCourses[course.id];
        var access = canAccessCourse(course.id);
        if (wasLocked === true && access.allowed === true) {
            previouslyLockedCourses[course.id] = false;
            showUnlockPopup(course);
            buildCourseTabs();

        }
    }
}

function onDrawStart(e) { var p = getCanvasPos(e.clientX, e.clientY); startDraw(p.x, p.y); }
function onDrawMove(e) { if (!isDrawing) return; var p = getCanvasPos(e.clientX, e.clientY); moveDraw(p.x, p.y); }
function onDrawEnd() { endDraw(); }
function startDraw(x, y) { isDrawing = true; currentPoints = [{ x:x, y:y }]; }

function moveDraw(x, y) {
    if (!isDrawing) return;
    currentPoints.push({ x:x, y:y }); redrawCanvas();
    drawSmoothPath(currentPoints, '#1a1a1a', 3.5, 1.0);
}

function endDraw() {
    if (!isDrawing) return; isDrawing = false;
    if (currentPoints.length < 3) { currentPoints = []; return; }
    canvasStrokes.push({ points: currentPoints.slice(), color: '#1a1a1a', alpha: 1.0, status: 'pending' });
    currentPoints = []; redrawCanvas();
}

function drawSmoothPath(points, color, lineWidth, alpha) {
    if (!ctx || points.length < 2) return;
    ctx.save(); ctx.globalAlpha = alpha; ctx.strokeStyle = color; ctx.lineWidth = lineWidth;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.shadowColor = color; ctx.shadowBlur = 1.5;
    ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y);
    for (var i = 1; i < points.length - 1; i++) { var mx = (points[i].x + points[i+1].x) / 2, my = (points[i].y + points[i+1].y) / 2; ctx.quadraticCurveTo(points[i].x, points[i].y, mx, my); }
    ctx.lineTo(points[points.length-1].x, points[points.length-1].y); ctx.stroke(); ctx.restore();
}

function redrawCanvas() {
    if (!ctx) return; ctx.clearRect(0, 0, canvas.width, canvas.height);
    canvasStrokes.forEach(function(s) { drawSmoothPath(s.points, s.color, 3.5, s.alpha); });
    if (currentPoints.length > 1) drawSmoothPath(currentPoints, '#1a1a1a', 3.5, 1.0);
}

function markLastStroke(result) {
    var color = result === 'correct' ? '#4CAF50' : '#F44336';
    for (var i = canvasStrokes.length - 1; i >= 0; i--) {
        if (canvasStrokes[i].status === 'pending') {
            canvasStrokes[i].status = result; canvasStrokes[i].color = color;
            redrawCanvas(); fadeStroke(canvasStrokes[i], result === 'correct' ? 700 : 500); break;
        }
    }
}

function fadeStroke(stroke, delayMs) {
    setTimeout(function() {
        var step = function() {
            stroke.alpha -= 0.05;
            if (stroke.alpha <= 0) { stroke.alpha = 0; var pos = canvasStrokes.indexOf(stroke); if (pos > -1) canvasStrokes.splice(pos, 1); }            redrawCanvas(); if (stroke.alpha > 0) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
    }, delayMs);
}

function clearCanvas() { canvasStrokes = []; currentPoints = []; isDrawing = false; if (ctx && canvas) ctx.clearRect(0, 0, canvas.width, canvas.height); resizeCanvas(); }

function setMicResult(text, state) { var el = document.getElementById('mic-result'); el.textContent = text; el.className = 'mic-result' + (state ? ' ' + state : ''); }
function resetMicResult() { if (micResultTimer) { clearTimeout(micResultTimer); micResultTimer = null; } setMicResult('Tap 🎤 and say the word!', ''); }
function scheduleMicReset(ms) { if (micResultTimer) clearTimeout(micResultTimer); micResultTimer = setTimeout(resetMicResult, ms || 6000); }

function clearRecording() {
    if (audioURL) { URL.revokeObjectURL(audioURL); audioURL = null; audioBlob = null; }
    audioChunks = []; if (audioPlayer) { audioPlayer.pause(); audioPlayer = null; }
    var rb = document.getElementById('replay-btn'); if (rb) rb.classList.remove('visible', 'playing');
}

function checkMicSupport() {
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { var btn = document.getElementById('mic-btn'); if (btn) btn.style.display = 'none'; document.getElementById('no-mic-msg').style.display = 'block'; }
}

function toggleListening() { isListening ? stopListening() : startListening(); }

function startListening() {
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { setMicResult('⚠️ Speech recognition not supported', 'wrong'); return; }
    clearRecording(); recognitionDone = false; isListening = true;
    if (recognitionTimeout) { clearTimeout(recognitionTimeout); recognitionTimeout = null; }
    var micBtn = document.getElementById('mic-btn');
    if (micBtn) { micBtn.classList.add('recording'); micBtn.textContent = '⏹'; }
    setMicResult('🎤 Listening... say the character!', 'listening');
    startRecognition();
    setTimeout(function() {
        if (!isListening) return;
        navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
            if (!isListening) { stream.getTracks().forEach(function(t) { t.stop(); }); return; }
            window._micStream = stream;
            var mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : '';
            try { mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType: mimeType } : {}); } catch(e) { console.warn('MediaRecorder error:', e); return; }
            audioChunks = [];
            mediaRecorder.ondataavailable = function(e) { if (e.data && e.data.size > 0) audioChunks.push(e.data); };
            mediaRecorder.onstop = function() {
                if (audioChunks.length > 0) {
                    audioBlob = new Blob(audioChunks, { type: mimeType || 'audio/webm' });
                    audioURL = URL.createObjectURL(audioBlob);
                    audioPlayer = new Audio(audioURL);
                    audioPlayer.onended = function() { var rb = document.getElementById('replay-btn'); if (rb) rb.classList.remove('playing'); };
                    var rb = document.getElementById('replay-btn'); if (rb) rb.classList.add('visible');
                }
                if (window._micStream) window._micStream.getTracks().forEach(function(t) { t.stop(); });
            };
            mediaRecorder.start();
        }).catch(function(err) { console.warn('MediaRecorder setup failed:', err.message); });
    }, 150);
}

function startRecognition() {
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition; if (!SR) return;
    recognition = new SR(); recognition.lang = 'zh-CN'; recognition.continuous = false;
    recognition.interimResults = true; recognition.maxAlternatives = 10;
    var hasProcessedFinal = false, speechDetected = false;
    recognition.onspeechstart = function() { speechDetected = true; if (recognitionTimeout) { clearTimeout(recognitionTimeout); recognitionTimeout = null; } setMicResult('🎤 Hearing you...', 'listening'); };
    recognition.onresult = function(event) {
        var word = getThemeWords()[idx]; if (!word) return;
        speechDetected = true; if (recognitionTimeout) { clearTimeout(recognitionTimeout); recognitionTimeout = null; }
        var finalResults = [], interimText = '';
        for (var i = event.resultIndex; i < event.results.length; i++) {
            var result = event.results[i];
            if (result.isFinal) { for (var j = 0; j < result.length; j++) finalResults.push({ transcript: result[j].transcript, confidence: result[j].confidence }); }
            else interimText += result[0].transcript;
        }
        if (interimText && !hasProcessedFinal) setMicResult('🎤 Hearing: "' + interimText + '"...', 'listening');
        if (finalResults.length > 0 && !hasProcessedFinal) {
            hasProcessedFinal = true; recognitionDone = true;
            var gradeResult = gradeRecognitionResult(finalResults, word.ch, word.py);
            showMicGrade(gradeResult.grade, gradeResult.heard, word.ch); stopListening();
        }
    };
    recognition.onend = function() {
        if (recognitionTimeout) { clearTimeout(recognitionTimeout); recognitionTimeout = null; }
        setTimeout(function() {
            if (!recognitionDone && isListening) { setMicResult(speechDetected ? "🤔 Couldn't understand. Tap 🎤 and try again!" : "🤔 No speech heard. Tap 🎤 and speak!", 'wrong'); scheduleMicReset(6000); }
            stopListening();
        }, 200);
    };
    recognition.onnomatch = function() { if (!recognitionDone) { setMicResult("🤔 No match found. Try speaking more clearly!", 'wrong'); scheduleMicReset(6000); } stopListening(); };
    recognition.onerror = function(e) {
        if (recognitionTimeout) { clearTimeout(recognitionTimeout); recognitionTimeout = null; }
        if (recognitionDone) return;
        var msg;
        switch(e.error) {
            case 'not-allowed': msg = '🚫 Microphone access denied. Please allow in Settings.'; break;
            case 'no-speech': msg = '🤔 No speech detected. Tap 🎤 and speak clearly!'; break;
            case 'network': msg = '⚠️ Network error. Speech recognition needs internet.'; break;
            case 'audio-capture': msg = '🎤 No microphone found. Check your device.'; break;
            case 'aborted': stopListening(); return;
            default: msg = '⚠️ Error: ' + e.error;
        }
        setMicResult(msg, 'wrong'); scheduleMicReset(6000); stopListening();
    };
    recognition.onspeechend = function() { setTimeout(function() { if (recognition && !recognitionDone) { try { recognition.stop(); } catch(e) {} } }, 1500); };
    try {
        recognition.start();
        recognitionTimeout = setTimeout(function() { if (isListening && !recognitionDone && !speechDetected) { setMicResult('⏱️ No speech detected. Tap 🎤 to try again.', 'wrong'); scheduleMicReset(5000); stopListening(); } }, 8000);
    } catch(e) { setMicResult('⚠️ Could not start microphone: ' + e.message, 'wrong'); stopListening(); }
}

function stopListening() {
    if (recognitionTimeout) { clearTimeout(recognitionTimeout); recognitionTimeout = null; }
    if (recognition) { try { recognition.stop(); } catch(e) {} recognition = null; }
    if (mediaRecorder && mediaRecorder.state !== 'inactive') { try { mediaRecorder.stop(); } catch(e) {} }
    isListening = false;
    var micBtn = document.getElementById('mic-btn');
    if (micBtn) { micBtn.classList.remove('recording'); micBtn.textContent = '🎤'; }
}

function playbackRecording() {
    if (!audioPlayer) return;
    var rb = document.getElementById('replay-btn');
    audioPlayer.pause(); audioPlayer.currentTime = 0; rb.classList.add('playing');
    audioPlayer.play().catch(function() { rb.classList.remove('playing'); setMicResult('⚠️ Could not play recording.', 'wrong'); });
}

function showMicGrade(grade, heard, target) {
    var word = getThemeWords()[idx]; if (!word) return;
    var pinyin = word.py, meaning = getLang() === 'th' ? word.th : word.en;
    switch(grade) {
        case 3:
            setMicResult('🎉 Perfect! "' + target + '" (' + pinyin + ') = ' + meaning, 'correct');
            var py = document.getElementById('char-pinyin');
            if (py) { py.classList.remove('pop'); void py.offsetWidth; py.classList.add('pop'); }
            setTimeout(speakWord, 400);
            var micResult = XHZ.addScore('study', 1, [word.word_id]);
              if (micResult && micResult.newItemUnlocked) {
             setTimeout(function() { showItemPopup(micResult.newItemUnlocked); }, 1000);
            }
break;
        case 2:
            setMicResult('👍 Close! I heard "' + heard + '" - try matching the tone of "' + target + '"', 'correct');
            setTimeout(speakWord, 600); break;
        case 1: setMicResult('❌ I heard "' + heard + '" — say "' + target + '" (' + pinyin + ')', 'wrong'); break;
        default: setMicResult('🤔 No speech heard. Tap 🎤 and say "' + target + '" (' + pinyin + ')', 'wrong');
    }
    scheduleMicReset(8000);
}

function getChineseVoice() {
    if (!window.speechSynthesis) return null;
    var voices = window.speechSynthesis.getVoices();
    return voices.find(function(v) { return v.lang === 'zh-CN'; }) 
        || voices.find(function(v) { return v.lang.startsWith('zh'); }) 
        || null;
}

function speakWord() {
    if (!window.speechSynthesis) return;
    var word = getThemeWords()[idx]; 
    if (!word) return;
    
    var doSpeak = function() {
        window.speechSynthesis.cancel();
        var u = new SpeechSynthesisUtterance(word.ch);
        u.lang = 'zh-CN'; 
        u.rate = 0.6;
        var voice = getChineseVoice(); 
        if (voice) u.voice = voice;
        var btn = document.getElementById('pinyin-speaker-btn');
        if (btn) btn.classList.add('speaking');
        u.onend = function() { if (btn) btn.classList.remove('speaking'); };
        u.onerror = function() { if (btn) btn.classList.remove('speaking'); };
        window.speechSynthesis.speak(u);
    };
    
    if (!voicesReady && window.speechSynthesis.getVoices().length === 0) {
        pendingSpeak = doSpeak;
        window.speechSynthesis.getVoices();
        setTimeout(function() {
            if (pendingSpeak) { pendingSpeak(); pendingSpeak = null; }
        }, 150);
    } else {
        doSpeak();
    }
}

function speakSentence() {
    if (!window.speechSynthesis) return;
    var word = getThemeWords()[idx]; 
    if (!word) return;
    
    var doSpeak = function() {
        window.speechSynthesis.cancel();
        var u = new SpeechSynthesisUtterance(word.zh);
        u.lang = 'zh-CN'; 
        u.rate = 0.8;
        var voice = getChineseVoice(); 
        if (voice) u.voice = voice;
        var btn = document.querySelector('.sentence-zh-row .icon-btn');
        if (btn) btn.classList.add('speaking');
        u.onend = function() { if (btn) btn.classList.remove('speaking'); };
        u.onerror = function() { if (btn) btn.classList.remove('speaking'); };
        window.speechSynthesis.speak(u);
    };
    
    if (!voicesReady && window.speechSynthesis.getVoices().length === 0) {
        pendingSpeak = doSpeak;
        window.speechSynthesis.getVoices();
        setTimeout(function() {
            if (pendingSpeak) { pendingSpeak(); pendingSpeak = null; }
        }, 150);
    } else {
        doSpeak();
    }
}
</script>

    resizeCanvas();

        var watchHidden = document.getElementById('panel-watch').classList.contains('mobile-hidden');
        var writeHidden = document.getElementById('panel-write').classList.contains('mobile-hidden');
        if (window.innerWidth > 768) { initAnimWriter(idx); initQuizWriter(idx); }
        else { if (!watchHidden) initAnimWriter(idx); if (!writeHidden) initQuizWriter(idx); }
